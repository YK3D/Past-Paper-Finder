  /* \u2500\u2500 CODES VIEW \u2500\u2500 */
  

  .top-bar {
    max-width: 1100px;
    margin: 0 auto 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .back-btn {

  .page-title { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.02em; }
  .page-title span { color: var(--accent); }

  /* ── Search box poda glow ── */
  .search-wrap {
    max-width: 1100px;
    margin: 0 auto 1.5rem;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* spinning border layers */
  .search-glow,
  .search-border,
  .search-dark-border {
    position: absolute;
    inset: 0;
    border-radius: 10px;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }
  .search-dark-border::before,
  .search-glow::before,
  .search-border::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 800px; height: 800px;
    background-repeat: no-repeat;
  }
  .search-dark-border {
    inset: -1px;
    border-radius: 10px;
  }
  .search-dark-border::before {
    transform: translate(-50%, -50%) rotate(82deg);
    background-image: conic-gradient(
      rgba(0,0,0,0),
      rgba(0,229,255,0.4),
      rgba(0,0,0,0) 10%,
      rgba(0,0,0,0) 50%,
      rgba(255,77,109,0.4),
      rgba(0,0,0,0) 60%
    );
    animation: searchSpin 4s linear infinite;
  }
  .search-border {
    inset: -1px;
    filter: blur(0.5px);
  }
  .search-border::before {
    transform: translate(-50%, -50%) rotate(70deg);
    background-image: conic-gradient(
      var(--bg),
      var(--accent) 5%,
      var(--bg) 14%,
      var(--bg) 50%,
      var(--accent2) 60%,
      var(--bg) 64%
    );
    animation: searchSpin 4s 0.1s linear infinite;
  }
  .search-glow {
    inset: -3px;
    filter: blur(8px);
    opacity: 0.5;
  }
  .search-glow::before {
    transform: translate(-50%, -50%) rotate(60deg);
    background-image: conic-gradient(
      #000,
      var(--accent) 5%,
      #000 38%,
      #000 50%,
      var(--accent2) 60%,
      #000 87%
    );
    animation: searchSpin 4s 0.3s linear infinite;
  }
  /* inner mask to show only border */
  .search-wrap::after {
    content: '';
    position: absolute;
    inset: 2px;
    border-radius: 8px;
    background: var(--surface);
    z-index: 1;
    pointer-events: none;
  }
  @keyframes searchSpin {
    100% { transform: translate(-50%, -50%) rotate(450deg); }
  }
  @keyframes boardGlowSpin {
    100% { transform: translate(-50%, -50%) rotate(-450deg); }
  }
  .search-input {
    position: relative;
    z-index: 2;
    width: 100%;
    background: transparent;
    border: none;
    border-radius: 8px;
    color: var(--text);

    font-size: 0.85rem;
    padding: 0.7rem 1rem;
    outline: none;
  }
  .search-input::placeholder { color: var(--muted); }

  .codes-grid {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
  }

  .codes-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    position: relative;
  }
  .codes-section::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .caie-sec::before { background: linear-gradient(90deg, var(--accent), #0070ff); }
  .aqa-sec::before  { background: linear-gradient(90deg, var(--accent2), #ff9900); }

  .sec-header { padding: 1rem 1.2rem; border-bottom: 1px solid var(--border); }
  .sec-title { font-size: 0.95rem; font-weight: 800; letter-spacing: 0.04em; }
  .caie-sec .sec-title { color: var(--accent); }
  .aqa-sec  .sec-title { color: var(--accent2); }
  .sec-sub { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--muted); margin-top: 0.2rem; }

  .cat-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.15em;

  .code-table { width: 100%; border-collapse: collapse; }
  .code-table tr { transition: background 0.12s; cursor: pointer; }
  .code-table tr:hover { background: rgba(255,255,255,0.04); }
  .code-table td { padding: 0.38rem 1.2rem; font-size: 0.8rem; line-height: 1.4; }

  .c-code {
    font-family: 'Space Mono', monospace;
    font-size: 0.76rem;
    width: 70px;
    white-space: nowrap;

  .caie-sec .c-code { color: var(--accent); }
  .aqa-sec  .c-code { color: var(--accent2); }
  .c-name { color: var(--text); }

  .hidden-row { display: none; }

  /* Responsive */
  @media (max-width: 680px) {
    .codes-grid { grid-template-columns: 1fr; }
    h1 { font-size: 1.8rem; }
    .row-2 { grid-template-columns: 1fr; }
    .page-title { font-size: 1.2rem; }

  /* ── Hide variant when GT selected ── */

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    15%       { transform: translateX(-6px); }
    30%       { transform: translateX(6px); }
    45%       { transform: translateX(-5px); }

  /* ── Field error highlight ── */

  /* ── Subject name tag ── */

  .did-you-mean {

    font-size: 0.7rem;
    margin-top: 0.35rem;
    color: rgba(255,255,255,0.55);

  .did-you-mean span {
    color: var(--accent);
    cursor: pointer;
    text-decoration: underline;
    font-weight: 700;
  }
  .did-you-mean span:hover { color: #fff; }

  .code-suggestions {
    position: absolute;
    top: 100%;
    left: 0; right: 0;
    background: #1a1a24;
    border: 1px solid rgba(0,229,255,0.25);
    border-radius: 6px;

    overflow-y: auto;

  .code-suggestions.open { display: block; }
  .code-suggestions::-webkit-scrollbar { width: 4px; }
  .code-suggestions::-webkit-scrollbar-track { background: transparent; }
  .code-suggestions::-webkit-scrollbar-thumb { background: rgba(0,229,255,0.2); border-radius: 2px; }
  .suggestion-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.55rem 0.75rem;

    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.12s;
  }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover, .suggestion-item.active {
    background: rgba(0,229,255,0.08);
  }
  .suggestion-code {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    min-width: 3rem;
    font-weight: 700;
  }
  .suggestion-name {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.65);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .suggestion-highlight { color: #fff; }

  /* ── Recent searches ── */
  .recent-box { margin-bottom: 1.2rem; display: none; }
  .recent-box.visible { display: block; }
  .recent-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .recent-clear {
    background: none; border: none; color: var(--muted);
    font-family: 'Space Mono', monospace; font-size: 0.6rem;
    cursor: pointer; letter-spacing: 0.1em;
  }
  .recent-clear:hover { color: var(--accent2); }
  .recent-chevron {
    font-size: 0.65rem;
    color: var(--accent);
    transition: transform 0.15s;
    display: inline-block;
  }
  .recent-list { display: flex; flex-direction: column; gap: 0.4rem; margin-top: 0.4rem; }
  .recent-item {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.45rem 0.7rem;
    cursor: pointer;
    transition: background 0.15s;
    gap: 0.5rem;
  }
  .recent-item:hover { background: rgba(0,229,255,0.05); border-color: rgba(0,229,255,0.2); }
  .recent-item-url {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    flex: 1; min-width: 0;
    letter-spacing: 0.02em;
  }
  .recent-item-open {
    font-family: 'Space Mono', monospace; font-size: 0.6rem;
    color: var(--accent); white-space: nowrap; flex-shrink: 0;
  }

  /* ── Download btn ── */
  .btn-download {
    flex: 1; padding: 0.6rem; border-radius: 7px;
    border: 1px solid var(--border);
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.8rem;
    cursor: pointer;
    background: transparent; color: var(--text);

                box-shadow 0.2s ease;

  .btn-download:hover {
    transform: translateY(2px);
    border-color: var(--accent);
    box-shadow: 0 3px 12px rgba(0,229,255,0.15);
  }
  .btn-download:active { transform: translateY(0); }




  .header-title-row {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    flex-wrap: wrap;
  }
  .header-logo {
    width: 2rem;
    height: 2rem;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .header-byline {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: #555570;
    font-weight: 400;
    align-self: flex-end;
    padding-bottom: 0.3rem;
    white-space: nowrap;
  }
  .made-by {
    margin-top: 1.5rem;
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: #3a3a55;
  }
  .lb-link-btn {
    display: block;
    text-align: center;
    margin: 0.8rem auto 0.4rem;
    padding: 0.5rem 1.2rem;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;

  .lb-link-btn:hover { border-color: var(--accent); color: var(--accent); }
  .version-tag {
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.08em;

  }
  /* ── Favourites ── */
  .fav-wrap { position: relative; display: block; }
  .fav-btn {
    position: absolute;
    right: 0.5rem;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;

  .fav-dropdown {
    display: none;

    top: calc(100% + 4px);
    left: 0; right: 0;

    overflow: hidden;

  .fav-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;

  .contact-section {
    margin-top: 2rem;
    padding: 1rem 1.2rem;
    border: 1px solid var(--border);
    border-radius: 12px;
    text-align: center;
    background: var(--surface);
  }
  .contact-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);

  }

    font-family: 'Syne', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;

  }
  .contact-email {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    text-decoration: none;
    letter-spacing: 0.02em;
    transition: opacity 0.2s;
  }
  .contact-email:hover { opacity: 0.7; }

  /* ── STARTUP ANIMATION ── */
  #splash {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    pointer-events: none;
    gap: 1rem;
  }
  #splash.done { }
  @keyframes splashFadeOut { }
  .splash-logo {
    width: 56px; height: 56px;
    border-radius: 14px;
    opacity: 0;
    transform: scale(0.5);
    animation: splashLogoIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s forwards;
  }
  @keyframes splashLogoIn {
    from { opacity: 0; transform: scale(0.4) rotate(-8deg); }
    to   { opacity: 1; transform: scale(1) rotate(0deg); }
  }
  .splash-title {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text);
    opacity: 0;
    animation: splashTitleIn 0.45s ease 0.4s forwards;
  }
  .splash-title span { color: var(--accent); }
  @keyframes splashTitleIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .splash-bar {
    width: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    animation: splashBarGrow 0.5s ease 0.65s forwards;
  }
  @keyframes splashBarGrow {
    from { width: 0; opacity: 0; }
    to   { width: 120px; opacity: 1; }
  }
  .splash-sub {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    opacity: 0;
    animation: splashSubIn 0.4s ease 0.9s forwards;
  }
  @keyframes splashSubIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* page content hidden until splash done */
  .container { opacity: 0; }

  .header-title-row .header-logo { display: none; }

  /* ── Board selector buttons ── */
  .board-btn-row {
    display: flex;
    gap: 0.6rem;
  }
  .board-btn-wrap {
    flex: 1;
    position: relative;
    border-radius: 10px;
  }
  /* Three spinning border layers — mirrors search-wrap */
  .bbn-dark, .bbn-border, .bbn-glow {
    position: absolute;
    inset: 0;
    border-radius: 10px;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .board-btn-wrap.active .bbn-dark,
  .board-btn-wrap.active .bbn-border,
  .board-btn-wrap.active .bbn-glow { opacity: 1; }
  .bbn-dark::before, .bbn-border::before, .bbn-glow::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 800px; height: 800px;
    background-repeat: no-repeat;
  }
  .bbn-dark   { inset: -1px; }
  .bbn-dark::before {
    transform: translate(-50%, -50%) rotate(82deg);
    background-image: conic-gradient(
      rgba(0,0,0,0),
      rgba(0,229,255,0.4),
      rgba(0,0,0,0) 10%,
      rgba(0,0,0,0) 50%,
      rgba(255,77,109,0.4),
      rgba(0,0,0,0) 60%
    );
    animation: boardGlowSpin 4s linear infinite;
  }
  .bbn-border { inset: -1px; filter: blur(0.5px); }
  .bbn-border::before {
    transform: translate(-50%, -50%) rotate(70deg);
    background-image: conic-gradient(
      var(--bg),
      var(--accent) 5%,
      var(--bg) 14%,
      var(--bg) 50%,
      var(--accent2) 60%,
      var(--bg) 64%
    );
    animation: boardGlowSpin 4s 0.1s linear infinite;
  }
  .bbn-glow   { inset: -3px; filter: blur(8px); opacity: 0; }
  .board-btn-wrap.active .bbn-glow { opacity: 0.5; }
  .bbn-glow::before {
    transform: translate(-50%, -50%) rotate(60deg);
    background-image: conic-gradient(
      #000,
      var(--accent) 5%,
      #000 38%,
      #000 50%,
      var(--accent2) 60%,
      #000 87%
    );
    animation: boardGlowSpin 4s 0.3s linear infinite;
  }
  /* inner mask */
  .board-btn-wrap::after {
    content: '';
    position: absolute;
    inset: 1.5px;
    border-radius: 8.5px;
    background: var(--surface);
    z-index: 1;
    pointer-events: none;
  }
  .board-btn {
    position: relative;
    z-index: 2;
    width: 100%;
    padding: 0.6rem 0;
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }
  .board-btn-wrap.active .board-btn {
    border-color: transparent;
  }
  .board-btn:hover { border-color: var(--accent); color: var(--text); }
  .board-btn.aqa:hover { border-color: var(--accent2); }
  .board-btn.active { color: var(--accent); background: rgba(0,229,255,0.06); }
  .board-btn.active.aqa { color: var(--accent2); background: rgba(255,77,109,0.06); }
  #code:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Manual override & dynamic loading ── */
  .manual-override-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-top: 0.3rem;
  }
  .btn-manual-toggle {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    padding: 0.2rem 0.55rem;

    transition: border-color 0.15s, color 0.15s;

  .btn-manual-toggle.active { border-color: var(--accent2); color: var(--accent2); }
  .manual-hint {

transition: left 0.45s cubic-bezier(0.23, 1, 0.32, 1),
opacity 0.3s cubic-bezier(0.23, 1, 0.32, 1);
}
.btn-generate .btn-text {
position: relative;
z-index: 1;
}
.btn-generate .arr-1,
.btn-generate .arr-2,
.btn-generate .circle { display: none; }
.btn-generate:hover {
background-color: var(–accent);
color: #000;
}
.btn-generate:hover .btn-arrow {
opacity: 1;
}
.btn-generate:active { scale: 0.97; }
.btn-generate:disabled { opacity: 0.6; pointer-events: none; }

.btn-row { display: flex; gap: 0.6rem; margin-top: 0.8rem; align-items: stretch; }
.btn-row .btn-generate { flex: 1; margin-top: 0; }
.btn-reset {
position: relative;
display: flex;
align-items: center;
justify-content: center;
gap: 0.4rem;
padding: 0.9rem 1.2rem;
background: transparent;
color: var(–accent2);
border: 2px solid var(–accent2);
border-radius: 10px;
font-family: ‘Syne’, sans-serif;
font-weight: 700;
font-size: 0.85rem;
cursor: pointer;
white-space: nowrap;
overflow: hidden;
transition: color 0.4s cubic-bezier(0.23, 1, 0.32, 1),
background-color 0.4s cubic-bezier(0.23, 1, 0.32, 1);
}
.btn-reset:hover {
background-color: var(–accent2);
color: #000;
}
.btn-reset:active { scale: 0.97; }
.btn-reset .reset-icon {
display: inline-block;
transform: scaleX(-1);
}
.btn-reset .reset-icon.spinning {
animation: resetSpin 0.9s cubic-bezier(0.23, 1, 0.32, 1) forwards;
}
@keyframes resetSpin {
from { transform: scaleX(-1) rotate(0deg); }
to   { transform: scaleX(-1) rotate(-360deg); }
}

.result-box {
margin-top: 1.2rem;
background: var(–bg);
border: 1px solid var(–border);
border-radius: 10px;
padding: 1rem;
display: none;
}
.result-box.show { display: block; }
.result-box.animating {
animation: resultSlideIn 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

@keyframes resultSlideIn {
from { opacity: 0; transform: translateY(10px) scale(0.98); }
to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* border flash on entry */
.result-box.animating {
animation: resultSlideIn 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards,
borderFlash 0.6s ease forwards;
}
@keyframes borderFlash {
0%   { border-color: var(–success); box-shadow: 0 0 0 3px rgba(0,255,170,0.2); }
100% { border-color: var(–border);  box-shadow: none; }
}

/* label pop */
.result-label {
font-family: ‘Space Mono’, monospace;
font-size: 0.6rem;
letter-spacing: 0.15em;
text-transform: uppercase;
color: var(–success);
margin-bottom: 0.5rem;
opacity: 0;
}
.result-box.animating .result-label {
animation: labelPop 0.3s ease 0.15s forwards;
}
@keyframes labelPop {
from { opacity: 0; transform: scale(0.9); letter-spacing: 0.3em; }
to   { opacity: 1; transform: scale(1);   letter-spacing: 0.15em; }
}

/* URL fade in */
.result-url {
font-family: ‘Space Mono’, monospace;
font-size: 0.72rem;
color: var(–muted);
word-break: break-all;
line-height: 1.6;
opacity: 0;
}
.result-box.animating .result-url {
animation: fadeUp 0.3s ease 0.22s forwards;
}

/* buttons stagger */
.result-actions { display: flex; gap: 0.6rem; margin-top: 1rem; flex-wrap: wrap; align-items: stretch; }
.result-actions button { opacity: 0; min-height: 36px; display: flex; align-items: center; justify-content: center; }
.result-box.animating .result-actions button:nth-child(1) { animation: fadeUp 0.25s ease 0.30s forwards; }
.result-box.animating .result-actions button:nth-child(2) { animation: fadeUp 0.25s ease 0.38s forwards; }
.result-box.animating .result-actions button:nth-child(3) { animation: fadeUp 0.25s ease 0.46s forwards; }
.result-box.animating .result-actions button:nth-child(4) { animation: fadeUp 0.25s ease 0.54s forwards; }
.result-box.animating .result-actions button:nth-child(5) { animation: fadeUp 0.25s ease 0.62s forwards; }

@keyframes fadeUp {
from { opacity: 0; transform: translateY(5px); }
to   { opacity: 1; transform: translateY(0); }
}

.btn-open, .btn-copy {
flex: 1;
padding: 0.6rem;
border-radius: 7px;
border: none;
font-family: ‘Syne’, sans-serif;
font-weight: 700;
font-size: 0.8rem;
cursor: pointer;
transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1),
box-shadow 0.2s ease,
background 0.2s ease,
filter 0.2s ease;
}
.btn-open {
background: var(–accent2);
color: #fff;
}
.btn-open:hover {
transform: translateY(-2px);
box-shadow: 0 6px 20px rgba(255,77,109,0.4);
filter: brightness(1.1);
}
.btn-open:active { transform: translateY(0); box-shadow: none; }

.btn-copy {
background: var(–border);
color: var(–text);
}
.btn-copy:hover {
background: var(–accent);
color: #000;
transform: translateY(-2px);
box-shadow: 0 6px 20px rgba(0,229,255,0.25);
}
.btn-copy:active { transform: translateY(0); box-shadow: none; }

.error-msg {
margin-top: 1rem;
background: rgba(255,77,109,0.1);
border: 1px solid var(–accent2);
border-radius: 8px;
padding: 0.8rem 1rem;
font-family: ‘Space Mono’, monospace;
font-size: 0.75rem;
color: var(–accent2);
display: none;
}
.error-msg.show { display: block; }
.error-msg .bypass-row {
margin-top: 0.6rem;
display: flex;
align-items: center;
gap: 0.5rem;
}
.btn-bypass {
display: inline-flex;
align-items: center;
gap: 0.3rem;
padding: 0.35rem 0.75rem;
background: transparent;
border: 1px solid var(–accent2);
border-radius: 6px;
color: var(–accent2);
font-family: ‘Syne’, sans-serif;
font-weight: 700;
font-size: 0.72rem;
cursor: pointer;
transition: background 0.2s, color 0.2s;
}
.btn-bypass:hover { background: var(–accent2); color: #000; }
.bypass-warning {
font-size: 0.65rem;
color: var(–muted);
opacity: 0.8;
}

/* \u2500\u2500 CODES VIEW \u2500\u2500 */

.top-bar {
max-width: 1100px;
margin: 0 auto 2rem;
display: flex;
align-items: center;
gap: 1rem;
flex-wrap: wrap;
}

.back-btn {
font-family: ‘Space Mono’, monospace;
font-size: 0.7rem;
letter-spacing: 0.1em;
color: var(–accent);
background: none;
border: 1px solid var(–border);
padding: 0.4rem 0.9rem;
border-radius: 6px;
cursor: pointer;
transition: border-color 0.2s;
white-space: nowrap;
}
.back-btn:hover { border-color: var(–accent); }

.page-title { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.02em; }
.page-title span { color: var(–accent); }

/* ── Search box poda glow ── */
.search-wrap {
max-width: 1100px;
margin: 0 auto 1.5rem;
position: relative;
display: flex;
align-items: center;
justify-content: center;
}
/* spinning border layers */
.search-glow,
.search-border,
.search-dark-border {
position: absolute;
inset: 0;
border-radius: 10px;
pointer-events: none;
overflow: hidden;
z-index: 0;
}
.search-dark-border::before,
.search-glow::before,
.search-border::before {
content: ‘’;
position: absolute;
top: 50%; left: 50%;
width: 800px; height: 800px;
background-repeat: no-repeat;
}
.search-dark-border {
inset: -1px;
border-radius: 10px;
}
.search-dark-border::before {
transform: translate(-50%, -50%) rotate(82deg);
background-image: conic-gradient(
rgba(0,0,0,0),
rgba(0,229,255,0.4),
rgba(0,0,0,0) 10%,
rgba(0,0,0,0) 50%,
rgba(255,77,109,0.4),
rgba(0,0,0,0) 60%
);
animation: searchSpin 4s linear infinite;
}
.search-border {
inset: -1px;
filter: blur(0.5px);
}
.search-border::before {
transform: translate(-50%, -50%) rotate(70deg);
background-image: conic-gradient(
var(–bg),
var(–accent) 5%,
var(–bg) 14%,
var(–bg) 50%,
var(–accent2) 60%,
var(–bg) 64%
);
animation: searchSpin 4s 0.1s linear infinite;
}
.search-glow {
inset: -3px;
filter: blur(8px);
opacity: 0.5;
}
.search-glow::before {
transform: translate(-50%, -50%) rotate(60deg);
background-image: conic-gradient(
#000,
var(–accent) 5%,
#000 38%,
#000 50%,
var(–accent2) 60%,
#000 87%
);
animation: searchSpin 4s 0.3s linear infinite;
}
/* inner mask to show only border */
.search-wrap::after {
content: ‘’;
position: absolute;
inset: 2px;
border-radius: 8px;
background: var(–surface);
z-index: 1;
pointer-events: none;
}
@keyframes searchSpin {
100% { transform: translate(-50%, -50%) rotate(450deg); }
}
@keyframes boardGlowSpin {
100% { transform: translate(-50%, -50%) rotate(-450deg); }
}
.search-input {
position: relative;
z-index: 2;
width: 100%;
background: transparent;
border: none;
border-radius: 8px;
color: var(–text);
font-family: ‘Space Mono’, monospace;
font-size: 0.85rem;
padding: 0.7rem 1rem;
outline: none;
}
.search-input::placeholder { color: var(–muted); }

.codes-grid {
max-width: 1100px;
margin: 0 auto;
display: grid;
grid-template-columns: 1fr 1fr;
gap: 1.5rem;
}

.codes-section {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 14px;
overflow: hidden;
position: relative;
}
.codes-section::before {
content: ‘’;
position: absolute;
top: 0; left: 0; right: 0;
height: 2px;
}
.caie-sec::before { background: linear-gradient(90deg, var(–accent), #0070ff); }
.aqa-sec::before  { background: linear-gradient(90deg, var(–accent2), #ff9900); }

.sec-header { padding: 1rem 1.2rem; border-bottom: 1px solid var(–border); }
.sec-title { font-size: 0.95rem; font-weight: 800; letter-spacing: 0.04em; }
.caie-sec .sec-title { color: var(–accent); }
.aqa-sec  .sec-title { color: var(–accent2); }
.sec-sub { font-family: ‘Space Mono’, monospace; font-size: 0.6rem; color: var(–muted); margin-top: 0.2rem; }

.cat-label {
font-family: ‘Space Mono’, monospace;
font-size: 0.58rem;
letter-spacing: 0.15em;
text-transform: uppercase;
color: var(–muted);
padding: 0.6rem 1.2rem 0.3rem;
border-top: 1px solid var(–border);
}
.cat-label:first-of-type { border-top: none; }

.code-table { width: 100%; border-collapse: collapse; }
.code-table tr { transition: background 0.12s; cursor: pointer; }
.code-table tr:hover { background: rgba(255,255,255,0.04); }
.code-table td { padding: 0.38rem 1.2rem; font-size: 0.8rem; line-height: 1.4; }

.c-code {
font-family: ‘Space Mono’, monospace;
font-size: 0.76rem;
width: 70px;
white-space: nowrap;
}
.caie-sec .c-code { color: var(–accent); }
.aqa-sec  .c-code { color: var(–accent2); }
.c-name { color: var(–text); }

.hidden-row { display: none; }

/* Responsive */
@media (max-width: 680px) {
.codes-grid { grid-template-columns: 1fr; }
h1 { font-size: 1.8rem; }
.row-2 { grid-template-columns: 1fr; }
.page-title { font-size: 1.2rem; }
}

/* ── Hide variant when GT selected ── */
.variant-hidden { display: none !important; }

@keyframes shake {
0%, 100% { transform: translateX(0); }
15%       { transform: translateX(-6px); }
30%       { transform: translateX(6px); }
45%       { transform: translateX(-5px); }
60%       { transform: translateX(5px); }
75%       { transform: translateX(-3px); }
90%       { transform: translateX(3px); }
}

/* ── Field error highlight ── */
.field input.field-error,
.field select.field-error {
border-color: var(–accent2) !important;
box-shadow: 0 0 0 3px rgba(255,77,109,0.15) !important;
animation: shake 0.45s ease;
}

/* ── Subject name tag ── */
.subject-name-tag {
display: none;
font-family: ‘Space Mono’, monospace;
font-size: 0.7rem;
color: var(–accent);
margin-top: 0.35rem;
padding: 0.25rem 0.5rem;
background: rgba(0,229,255,0.07);
border-radius: 4px;
border: 1px solid rgba(0,229,255,0.2);
}
.subject-name-tag.visible { display: inline-block; }

.did-you-mean {
font-family: ‘Space Mono’, monospace;
font-size: 0.7rem;
margin-top: 0.35rem;
color: rgba(255,255,255,0.55);
}
.did-you-mean span {
color: var(–accent);
cursor: pointer;
text-decoration: underline;
font-weight: 700;
}
.did-you-mean span:hover { color: #fff; }

.code-suggestions {
position: absolute;
top: 100%;
left: 0; right: 0;
background: #1a1a24;
border: 1px solid rgba(0,229,255,0.25);
border-radius: 6px;
max-height: 220px;
overflow-y: auto;
z-index: 100;
box-shadow: 0 8px 24px rgba(0,0,0,0.5);
display: none;
}
.code-suggestions.open { display: block; }
.code-suggestions::-webkit-scrollbar { width: 4px; }
.code-suggestions::-webkit-scrollbar-track { background: transparent; }
.code-suggestions::-webkit-scrollbar-thumb { background: rgba(0,229,255,0.2); border-radius: 2px; }
.suggestion-item {
display: flex;
align-items: center;
gap: 0.75rem;
padding: 0.55rem 0.75rem;
cursor: pointer;
border-bottom: 1px solid rgba(255,255,255,0.04);
transition: background 0.12s;
}
.suggestion-item:last-child { border-bottom: none; }
.suggestion-item:hover, .suggestion-item.active {
background: rgba(0,229,255,0.08);
}
.suggestion-code {
font-family: ‘Space Mono’, monospace;
font-size: 0.75rem;
color: var(–accent);
min-width: 3rem;
font-weight: 700;
}
.suggestion-name {
font-family: ‘Space Mono’, monospace;
font-size: 0.7rem;
color: rgba(255,255,255,0.65);
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}
.suggestion-highlight { color: #fff; }

/* ── Recent searches ── */
.recent-box { margin-bottom: 1.2rem; display: none; }
.recent-box.visible { display: block; }
.recent-label {
font-family: ‘Space Mono’, monospace;
font-size: 0.6rem;
letter-spacing: 0.15em;
text-transform: uppercase;
color: var(–muted);
margin-bottom: 0.5rem;
display: flex;
justify-content: space-between;
align-items: center;
}
.recent-clear {
background: none; border: none; color: var(–muted);
font-family: ‘Space Mono’, monospace; font-size: 0.6rem;
cursor: pointer; letter-spacing: 0.1em;
}
.recent-clear:hover { color: var(–accent2); }
.recent-chevron {
font-size: 0.65rem;
color: var(–accent);
transition: transform 0.15s;
display: inline-block;
}
.recent-list { display: flex; flex-direction: column; gap: 0.4rem; margin-top: 0.4rem; }
.recent-item {
display: flex; align-items: center; justify-content: space-between;
background: var(–surface);
border: 1px solid var(–border);
border-radius: 6px;
padding: 0.45rem 0.7rem;
cursor: pointer;
transition: background 0.15s;
gap: 0.5rem;
}
.recent-item:hover { background: rgba(0,229,255,0.05); border-color: rgba(0,229,255,0.2); }
.recent-item-url {
font-family: ‘Space Mono’, monospace;
font-size: 0.7rem;
color: var(–text);
white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
flex: 1; min-width: 0;
letter-spacing: 0.02em;
}
.recent-item-open {
font-family: ‘Space Mono’, monospace; font-size: 0.6rem;
color: var(–accent); white-space: nowrap; flex-shrink: 0;
}

/* ── Download btn ── */
.btn-download {
flex: 1; padding: 0.6rem; border-radius: 7px;
border: 1px solid var(–border);
font-family: ‘Syne’, sans-serif; font-weight: 700; font-size: 0.8rem;
cursor: pointer;
background: transparent; color: var(–text);
transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1),
border-color 0.2s ease,
box-shadow 0.2s ease;
}
.btn-download:hover {
transform: translateY(2px);
border-color: var(–accent);
box-shadow: 0 3px 12px rgba(0,229,255,0.15);
}
.btn-download:active { transform: translateY(0); }

.header-title-row {
display: flex;
align-items: center;
gap: 0.55rem;
flex-wrap: wrap;
}
.header-logo {
width: 2rem;
height: 2rem;
border-radius: 6px;
flex-shrink: 0;
}
.header-byline {
font-family: ‘Space Mono’, monospace;
font-size: 0.75rem;
color: #555570;
font-weight: 400;
align-self: flex-end;
padding-bottom: 0.3rem;
white-space: nowrap;
}
.made-by {
margin-top: 1.5rem;
text-align: center;
font-family: ‘Space Mono’, monospace;
font-size: 0.8rem;
font-weight: 700;
letter-spacing: 0.12em;
color: #3a3a55;
}
.lb-link-btn {
display: block;
text-align: center;
margin: 0.8rem auto 0.4rem;
padding: 0.5rem 1.2rem;
background: transparent;
border: 1px solid var(–border);
border-radius: 8px;
color: var(–muted);
font-family: ‘Space Mono’, monospace;
font-size: 0.7rem;
letter-spacing: 0.06em;
text-decoration: none;
transition: border-color 0.2s, color 0.2s;
width: fit-content;
}
.lb-link-btn:hover { border-color: var(–accent); color: var(–accent); }
.version-tag {
text-align: center;
font-family: ‘Space Mono’, monospace;
font-size: 0.65rem;
letter-spacing: 0.08em;
color: #2a2a40;
margin-top: 0.25rem;
}
/* ── Favourites ── */
.fav-wrap { position: relative; display: block; }
.fav-btn {
position: absolute;
right: 0.5rem;
top: 50%;
transform: translateY(-50%);
background: transparent;
border: none;
color: var(–muted);
font-size: 1rem;
cursor: pointer;
padding: 0.2rem;
line-height: 1;
transition: color 0.2s, transform 0.2s;
z-index: 3;
}
.fav-btn:hover { color: #ffd700; transform: translateY(-50%) scale(1.2); }
.fav-btn.starred { color: #ffd700; }
.fav-dropdown {
display: none;
position: absolute;
top: calc(100% + 4px);
left: 0; right: 0;
background: var(–surface);
border: 1px solid var(–border);
border-radius: 8px;
z-index: 100;
overflow: hidden;
box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.fav-dropdown.open { display: block; }
.fav-item {
display: flex;
align-items: center;
gap: 0.5rem;
padding: 0.55rem 0.8rem;
cursor: pointer;
font-family: ‘Space Mono’, monospace;
font-size: 0.72rem;
transition: background 0.15s;
border-bottom: 1px solid var(–border);
}
.fav-item:last-child { border-bottom: none; }
.fav-item:hover { background: rgba(0,229,255,0.06); }
.fav-item-code { color: var(–accent); font-weight: 700; min-width: 2.5rem; }
.fav-item-name { color: var(–text); flex: 1; }
.fav-item-del { color: var(–muted); font-size: 0.65rem; margin-left: auto; }
.fav-item-del:hover { color: #ff4d6d; }
.fav-empty { padding: 0.8rem; font-family: ‘Space Mono’, monospace; font-size: 0.7rem; color: var(–muted); text-align: center; }

.contact-section {
margin-top: 2rem;
padding: 1rem 1.2rem;
border: 1px solid var(–border);
border-radius: 12px;
text-align: center;
background: var(–surface);
}
.contact-label {
font-family: ‘Space Mono’, monospace;
font-size: 0.6rem;
letter-spacing: 0.15em;
text-transform: uppercase;
color: var(–muted);
margin-bottom: 0.5rem;
}
.contact-name {
font-family: ‘Syne’, sans-serif;
font-size: 0.95rem;
font-weight: 700;
color: var(–text);
margin-bottom: 0.3rem;
}
.contact-email {
font-family: ‘Space Mono’, monospace;
font-size: 0.75rem;
color: var(–accent);
text-decoration: none;
letter-spacing: 0.02em;
transition: opacity 0.2s;
}
.contact-email:hover { opacity: 0.7; }

/* ── STARTUP ANIMATION ── */
#splash {
position: fixed;
inset: 0;
background: var(–bg);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
z-index: 9999;
pointer-events: none;
gap: 1rem;
}
#splash.done { }
@keyframes splashFadeOut { }
.splash-logo {
width: 56px; height: 56px;
border-radius: 14px;
opacity: 0;
transform: scale(0.5);
animation: splashLogoIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s forwards;
}
@keyframes splashLogoIn {
from { opacity: 0; transform: scale(0.4) rotate(-8deg); }
to   { opacity: 1; transform: scale(1) rotate(0deg); }
}
.splash-title {
font-family: ‘Syne’, sans-serif;
font-size: 2rem;
font-weight: 800;
letter-spacing: -0.02em;
color: var(–text);
opacity: 0;
animation: splashTitleIn 0.45s ease 0.4s forwards;
}
.splash-title span { color: var(–accent); }
@keyframes splashTitleIn {
from { opacity: 0; transform: translateY(8px); }
to   { opacity: 1; transform: translateY(0); }
}
.splash-bar {
width: 0;
height: 2px;
background: linear-gradient(90deg, var(–accent), var(–accent2));
border-radius: 2px;
animation: splashBarGrow 0.5s ease 0.65s forwards;
}
@keyframes splashBarGrow {
from { width: 0; opacity: 0; }
to   { width: 120px; opacity: 1; }
}
.splash-sub {
font-family: ‘Space Mono’, monospace;
font-size: 0.65rem;
letter-spacing: 0.15em;
text-transform: uppercase;
color: var(–muted);
opacity: 0;
animation: splashSubIn 0.4s ease 0.9s forwards;
}
@keyframes splashSubIn {
from { opacity: 0; }
to   { opacity: 1; }
}

/* page content hidden until splash done */
.container { opacity: 0; }

.header-title-row .header-logo { display: none; }

/* ── Board selector buttons ── */
.board-btn-row {
display: flex;
gap: 0.6rem;
}
.board-btn-wrap {
flex: 1;
position: relative;
border-radius: 10px;
}
/* Three spinning border layers — mirrors search-wrap */
.bbn-dark, .bbn-border, .bbn-glow {
position: absolute;
inset: 0;
border-radius: 10px;
pointer-events: none;
overflow: hidden;
z-index: 0;
opacity: 0;
transition: opacity 0.3s ease;
}
.board-btn-wrap.active .bbn-dark,
.board-btn-wrap.active .bbn-border,
.board-btn-wrap.active .bbn-glow { opacity: 1; }
.bbn-dark::before, .bbn-border::before, .bbn-glow::before {
content: ‘’;
position: absolute;
top: 50%; left: 50%;
width: 800px; height: 800px;
background-repeat: no-repeat;
}
.bbn-dark   { inset: -1px; }
.bbn-dark::before {
transform: translate(-50%, -50%) rotate(82deg);
background-image: conic-gradient(
rgba(0,0,0,0),
rgba(0,229,255,0.4),
rgba(0,0,0,0) 10%,
rgba(0,0,0,0) 50%,
rgba(255,77,109,0.4),
rgba(0,0,0,0) 60%
);
animation: boardGlowSpin 4s linear infinite;
}
.bbn-border { inset: -1px; filter: blur(0.5px); }
.bbn-border::before {
transform: translate(-50%, -50%) rotate(70deg);
background-image: conic-gradient(
var(–bg),
var(–accent) 5%,
var(–bg) 14%,
var(–bg) 50%,
var(–accent2) 60%,
var(–bg) 64%
);
animation: boardGlowSpin 4s 0.1s linear infinite;
}
.bbn-glow   { inset: -3px; filter: blur(8px); opacity: 0; }
.board-btn-wrap.active .bbn-glow { opacity: 0.5; }
.bbn-glow::before {
transform: translate(-50%, -50%) rotate(60deg);
background-image: conic-gradient(
#000,
var(–accent) 5%,
#000 38%,
#000 50%,
var(–accent2) 60%,
#000 87%
);
animation: boardGlowSpin 4s 0.3s linear infinite;
}
/* inner mask */
.board-btn-wrap::after {
content: ‘’;
position: absolute;
inset: 1.5px;
border-radius: 8.5px;
background: var(–surface);
z-index: 1;
pointer-events: none;
}
.board-btn {
position: relative;
z-index: 2;
width: 100%;
padding: 0.6rem 0;
background: transparent;
border: 1.5px solid var(–border);
border-radius: 8px;
color: var(–muted);
font-family: ‘Syne’, sans-serif;
font-size: 0.9rem;
font-weight: 700;
letter-spacing: 0.04em;
cursor: pointer;
transition: border-color 0.2s, color 0.2s, background 0.2s;
}
.board-btn-wrap.active .board-btn {
border-color: transparent;
}
.board-btn:hover { border-color: var(–accent); color: var(–text); }
.board-btn.aqa:hover { border-color: var(–accent2); }
.board-btn.active { color: var(–accent); background: rgba(0,229,255,0.06); }
.board-btn.active.aqa { color: var(–accent2); background: rgba(255,77,109,0.06); }
#code:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Manual override & dynamic loading ── */
.manual-override-row {
display: flex;
align-items: center;
gap: 0.6rem;
margin-top: 0.3rem;
}
.btn-manual-toggle {
background: none;
border: 1px solid var(–border);
color: var(–muted);
font-family: ‘Space Mono’, monospace;
font-size: 0.62rem;
padding: 0.2rem 0.55rem;
border-radius: 5px;
cursor: pointer;
transition: border-color 0.15s, color 0.15s;
letter-spacing: 0.03em;
}
.btn-manual-toggle:hover { border-color: var(–accent); color: var(–accent); }
.btn-manual-toggle.active { border-color: var(–accent2); color: var(–accent2); }
.manual-hint {
font-family: ‘Space Mono’, monospace;
font-size: 0.6rem;
color: var(–accent2);
opacity: 0.8;
}
.field-loading::after {
content: ‘’;
display: block;
height: 2px;
background: linear-gradient(90deg, transparent, var(–accent), transparent);
background-size: 200% 100%;
animation: loadingBar 1.2s linear infinite;
border-radius: 2px;
margin-top: 3px;
}
@keyframes loadingBar {
0%   { background-position: -200% 0; }
100% { background-position: 200% 0; }
}

/* ── WiFi loader (generate) ── */
#wifi-loader {
–background: #62abff;
–front-color: var(–accent);
–back-color: var(–border);
–text-color: var(–muted);
width: 64px; height: 64px;
border-radius: 50px;
position: relative;
display: flex;
justify-content: center;
align-items: center;
display: none;
margin: 0 auto;
}
#wifi-loader.active { display: flex; }
#wifi-loader svg {
position: absolute;
display: flex;
justify-content: center;
align-items: center;
}
#wifi-loader svg circle {
position: absolute;
fill: none;
stroke-width: 6px;
stroke-linecap: round;
stroke-linejoin: round;
transform: rotate(-100deg);
transform-origin: center;
}
#wifi-loader svg circle.back { stroke: var(–back-color); }
#wifi-loader svg circle.front { stroke: var(–front-color); }
#wifi-loader svg.circle-outer { height: 86px; width: 86px; }
#wifi-loader svg.circle-outer circle { stroke-dasharray: 62.75 188.25; }
#wifi-loader svg.circle-outer circle.back  { animation: circle-outer135 1.8s ease infinite 0.3s; }
#wifi-loader svg.circle-outer circle.front { animation: circle-outer135 1.8s ease infinite 0.15s; }
#wifi-loader svg.circle-middle { height: 60px; width: 60px; }
#wifi-loader svg.circle-middle circle { stroke-dasharray: 42.5 127.5; }
#wifi-loader svg.circle-middle circle.back  { animation: circle-middle6123 1.8s ease infinite 0.25s; }
#wifi-loader svg.circle-middle circle.front { animation: circle-middle6123 1.8s ease infinite 0.1s; }
#wifi-loader svg.circle-inner { height: 34px; width: 34px; }
#wifi-loader svg.circle-inner circle { stroke-dasharray: 22 66; }
#wifi-loader svg.circle-inner circle.back  { animation: circle-inner162 1.8s ease infinite 0.2s; }
#wifi-loader svg.circle-inner circle.front { animation: circle-inner162 1.8s ease infinite 0.05s; }
#wifi-loader .text {
position: absolute;
bottom: -32px;
display: flex; justify-content: center; align-items: center;
font-weight: 500; font-size: 11px; letter-spacing: 0.2px;
white-space: nowrap;
}
#wifi-loader .text::before, #wifi-loader .text::after { content: attr(data-text); }
#wifi-loader .text::before { color: var(–text-color); }
#wifi-loader .text::after {
color: var(–front-color);
animation: text-animation76 3.6s ease infinite;
position: absolute; left: 0;
}
@keyframes circle-outer135 {
0%   { stroke-dashoffset: 25; }
25%  { stroke-dashoffset: 0; }
65%  { stroke-dashoffset: 301; }
80%  { stroke-dashoffset: 276; }
100% { stroke-dashoffset: 276; }
}
@keyframes circle-middle6123 {
0%   { stroke-dashoffset: 17; }
25%  { stroke-dashoffset: 0; }
65%  { stroke-dashoffset: 204; }
80%  { stroke-dashoffset: 187; }
100% { stroke-dashoffset: 187; }
}
@keyframes circle-inner162 {
0%   { stroke-dashoffset: 9; }
25%  { stroke-dashoffset: 0; }
65%  { stroke-dashoffset: 106; }
80%  { stroke-dashoffset: 97; }
100% { stroke-dashoffset: 97; }
}
@keyframes text-animation76 {
0%   { clip-path: inset(0 100% 0 0); }
50%  { clip-path: inset(0); }
100% { clip-path: inset(0 0 0 100%); }
}

/* ── Bounce loader (download) ── */
.dl-loader {
display: none;
position: relative;
width: 80px;
height: 60px;
margin: 0 auto;
}
.dl-loader.active { display: block; }
.dl-loader:before {
content: “”;
position: absolute;
bottom: 20px; left: 33px;
height: 20px; width: 20px;
border-radius: 50%;
background: var(–accent);
animation: loading-bounce 0.5s ease-in-out infinite alternate;
}
.dl-loader:after {
content: “”;
position: absolute;
right: 0; top: 0;
height: 5px; width: 30px;
border-radius: 4px;
box-shadow: 0 4px 0 var(–border), -23px 33px 0 var(–border), -46px 63px 0 var(–border);
animation: loading-step 1s ease-in-out infinite;
}
@keyframes loading-bounce {
0%   { transform: scale(1, 0.7); }
40%  { transform: scale(0.8, 1.2); }
60%  { transform: scale(1, 1); }
100% { bottom: 90px; }
}
@keyframes loading-step {
0%   { box-shadow: 0 8px 0 rgba(0,0,0,0), 0 8px 0 var(–border), -23px 33px 0 var(–border), -46px 60px 0 var(–border); }
100% { box-shadow: 0 8px 0 var(–border), -23px 33px 0 var(–border), -46px 60px 0 var(–border), -46px 60px 0 rgba(0,0,0,0); }
}

/* ── Star rating ── */
.rating-section {
margin-top: 1.2rem;
padding: 1rem 1.2rem;
border: 1px solid var(–border);
border-radius: 12px;
text-align: center;
background: var(–surface);
}
.rating-label {
font-family: ‘Space Mono’, monospace;
font-size: 0.6rem;
letter-spacing: 0.15em;
text-transform: uppercase;
color: var(–muted);
margin-bottom: 0.7rem;
}
.radio {
display: flex;
justify-content: center;
gap: 10px;
flex-direction: row-reverse;
}
.radio > input {
position: absolute;
appearance: none;
}
.radio > label {
cursor: pointer;
font-size: 30px;
position: relative;
display: inline-block;
transition: transform 0.3s ease;
}
.radio > label > svg { fill: #666; transition: fill 0.3s ease; }
/* Remove dots */
.radio > label::before, .radio > label::after { display: none; }
.radio > label:hover {
transform: scale(1.2);
animation: starPulse 0.6s infinite alternate;
}
.radio > label:hover > svg,
.radio > label:hover ~ label > svg {
fill: #ff9e0b;
filter: drop-shadow(0 0 15px rgba(255,158,11,0.9));
animation: shimmer 1s ease infinite alternate;
}
.radio > input:checked + label > svg,
.radio > input:checked + label ~ label > svg {
fill: #ff9e0b;
filter: drop-shadow(0 0 15px rgba(255,158,11,0.9));
animation: starPulse 0.8s infinite alternate;
}
.radio > input:checked + label:hover > svg,
.radio > input:checked + label:hover ~ label > svg { fill: #e58e09; }
.radio > label:hover > svg, .radio > label:hover ~ label > svg { fill: #ff9e0b; }
.radio input:checked ~ label svg { fill: #ffa723; }
@keyframes starPulse { 0%{transform:scale(1)} 100%{transform:scale(1.1)} }
@keyframes shimmer {
0%  { filter: drop-shadow(0 0 10px rgba(255,158,11,0.5)); }
100%{ filter: drop-shadow(0 0 20px rgba(255,158,11,1)); }
}
.rating-submit-btn {
margin-top: 0.8rem;
padding: 0.55rem 1.4rem;
background: transparent;
border: 1.5px solid var(–accent);
border-radius: 8px;
color: var(–accent);
font-family: ‘Syne’, sans-serif;
font-weight: 700;
font-size: 0.82rem;
letter-spacing: 0.04em;
cursor: pointer;
transition: background 0.2s, color 0.2s;
}
.rating-submit-btn:hover:not(:disabled) {
background: var(–accent);
color: #000;
}
.rating-submit-btn:disabled {
opacity: 0.35;
cursor: not-allowed;
border-color: var(–muted);
color: var(–muted);
}
.rating-thanks {
display: none;
font-family: ‘Space Mono’, monospace;
font-size: 0.7rem;
color: var(–accent);
margin-top: 0.6rem;
letter-spacing: 0.05em;
}
.rating-thanks.show { display: block; }

/* ── Auth modal ── */
.auth-modal-bg {
display: none; position: fixed; inset: 0;
background: rgba(0,0,0,0.7); z-index: 1000;
align-items: center; justify-content: center;
}
.auth-modal-bg.show { display: flex; }
.auth-modal {
background: var(–surface); border: 1px solid var(–border);
border-radius: 14px; padding: 1.8rem; width: 340px; max-width: 95vw;
box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.auth-title {
font-family: ‘Syne’, sans-serif; font-weight: 800;
font-size: 1.2rem; margin-bottom: 1.2rem; text-align: center;
}
.auth-title span { color: var(–accent); }
.auth-field { margin-bottom: 0.8rem; }
.auth-field label {
display: block; font-family: ‘Space Mono’, monospace;
font-size: 0.62rem; letter-spacing: 0.1em;
text-transform: uppercase; color: var(–muted); margin-bottom: 0.3rem;
}
.auth-input {
width: 100%; background: var(–bg); border: 1px solid var(–border);
border-radius: 8px; color: var(–text); font-family: ‘Space Mono’, monospace;
font-size: 0.85rem; padding: 0.55rem 0.8rem; outline: none;
transition: border-color 0.2s; box-sizing: border-box;
}
.auth-input:focus { border-color: var(–accent); }
.auth-btn {
width: 100%; padding: 0.65rem; background: var(–accent); color: #000;
border: none; border-radius: 8px; font-family: ‘Syne’, sans-serif;
font-weight: 700; font-size: 0.9rem; cursor: pointer;
transition: opacity 0.2s; margin-top: 0.4rem;
}
.auth-btn:hover { opacity: 0.85; }
.auth-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.auth-switch {
text-align: center; font-family: ‘Space Mono’, monospace;
font-size: 0.68rem; color: var(–muted); margin-top: 0.8rem;
}
.auth-switch a { color: var(–accent); cursor: pointer; text-decoration: none; }
.auth-switch a:hover { text-decoration: underline; }
.auth-error {
color: #ff4d6d; font-family: ‘Space Mono’, monospace;
font-size: 0.68rem; text-align: center; margin-top: 0.4rem;
min-height: 1rem;
}
.auth-close {
position: absolute; top: 1rem; right: 1rem;
background: none; border: none; color: var(–muted);
font-size: 1.2rem; cursor: pointer; line-height: 1;
}
.auth-modal { position: relative; }

/* ── User pill in header ── */
.user-pill {
display: flex; align-items: center; gap: 0.4rem;
padding: 0.25rem 0.6rem; border: 1px solid var(–border);
border-radius: 20px; cursor: pointer;
font-family: ‘Space Mono’, monospace; font-size: 0.65rem;
color: var(–text); transition: border-color 0.2s;
background: transparent; white-space: nowrap;
max-width: 120px; overflow: hidden; text-overflow: ellipsis;
}
.user-pill:hover { border-color: var(–accent); color: var(–accent); }
.user-pill-dot { width: 7px; height: 7px; background: var(–accent); border-radius: 50%; flex-shrink: 0; }
.sign-in-btn {
padding: 0.25rem 0.7rem; border: 1px solid var(–border);
border-radius: 20px; cursor: pointer;
font-family: ‘Space Mono’, monospace; font-size: 0.65rem;
color: var(–muted); background: transparent;
transition: border-color 0.2s, color 0.2s;
}
.sign-in-btn:hover { border-color: var(–accent); color: var(–accent); }

/* ── Reset ── */

- { box-sizing: border-box; }
  body { margin: 0; overflow: hidden; height: 100vh; background: var(–bg); }

/* ── Layout ── */
.viewer-root { display: flex; height: 100vh; width: 100vw; overflow: hidden; }

/* ── Thumbnail sidebar ── */
.thumb-sidebar {
width: 96px; flex-shrink: 0; overflow-y: auto; overflow-x: hidden;
background: #1a1a1a; border-right: 1px solid #333;
display: flex; flex-direction: column; align-items: center; padding: 0.5rem 0;
gap: 0.5rem;
}
.thumb-sidebar::-webkit-scrollbar { width: 4px; }
.thumb-sidebar::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }
.thumb-item {
width: 72px; cursor: pointer; border: 2px solid transparent;
border-radius: 3px; overflow: hidden; flex-shrink: 0;
transition: border-color 0.15s;
}
.thumb-item.active { border-color: var(–accent); }
.thumb-item canvas { width: 72px !important; height: auto !important; display: block; }
.thumb-item .thumb-num {
text-align: center; font-family: ‘Space Mono’, monospace;
font-size: 0.55rem; color: #888; padding: 0.15rem 0;
background: #1a1a1a;
}

/* ── Centre: topbar + main canvas ── */
.viewer-centre { flex: 1; min-width: 0; display: flex; flex-direction: column; }

/* ── PDF Search bar ── */
.pdf-search-bar {
display: none; align-items: center; gap: 0.5rem;
padding: 0.35rem 0.8rem; background: #1e1e1e;
border-bottom: 1px solid #333; flex-shrink: 0;
}
.pdf-search-bar.show { display: flex; }
.pdf-search-input {
flex: 1; background: #2a2a2a; border: 1px solid #444; border-radius: 6px;
color: #fff; font-family: ‘Space Mono’, monospace; font-size: 0.72rem;
padding: 0.3rem 0.6rem; outline: none;
}
.pdf-search-input:focus { border-color: var(–accent); }
.pdf-search-count { font-family: ‘Space Mono’, monospace; font-size: 0.62rem; color: #888; min-width: 4rem; }
.pdf-search-btn {
background: transparent; border: 1px solid #444; border-radius: 5px;
color: #aaa; font-size: 0.75rem; padding: 0.25rem 0.45rem; cursor: pointer;
transition: all 0.15s;
}
.pdf-search-btn:hover { border-color: var(–accent); color: var(–accent); }
.search-highlight { background: rgba(255,230,0,0.4); border-radius: 2px; }
.search-highlight.current { background: rgba(255,140,0,0.6); }
/* ── Topbar ── */
.pdf-topbar {
display: flex; align-items: center; gap: 0.5rem;
padding: 0.45rem 0.8rem;
background: #242424; border-bottom: 1px solid #333; flex-shrink: 0;
min-height: 44px;
}
.back-btn-v {
background: transparent; border: 1px solid #444; border-radius: 6px;
color: #aaa; font-family: ‘Space Mono’, monospace; font-size: 0.68rem;
padding: 0.3rem 0.6rem; cursor: pointer; white-space: nowrap;
transition: border-color 0.15s, color 0.15s; flex-shrink: 0;
}
.back-btn-v:hover { border-color: var(–accent); color: var(–accent); }
.pdf-title-bar {
flex: 1; font-family: ‘Space Mono’, monospace; font-size: 0.68rem;
color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0;
}
.pdf-page-nav { display: flex; align-items: center; gap: 0.35rem; flex-shrink: 0; }
.pdf-page-nav button {
background: #333; border: 1px solid #444; border-radius: 6px; color: #ccc;
font-size: 1rem; font-weight: 700; width: 30px; height: 30px;
display: flex; align-items: center; justify-content: center;
cursor: pointer; transition: all 0.15s;
}
.pdf-page-nav button:hover { background: #444; border-color: var(–accent); color: var(–accent); }
.pdf-page-nav .page-info {
font-family: ‘Space Mono’, monospace; font-size: 0.65rem; color: #aaa;
min-width: 4.5rem; text-align: center;
}
.topbar-right { display: flex; align-items: center; gap: 0.35rem; flex-shrink: 0; flex-wrap: wrap; }

/* ── Markup toolbar ── */
.markup-bar {
display: flex; align-items: center; gap: 0.3rem;
padding: 0.3rem 0.8rem; background: #1a1a1a;
border-bottom: 1px solid #333; flex-shrink: 0; flex-wrap: wrap;
}
.mu-btn {
background: transparent; border: 1px solid #444; border-radius: 5px;
color: #aaa; font-size: 0.72rem; padding: 0.22rem 0.5rem; cursor: pointer;
transition: all 0.15s; font-family: ‘Space Mono’, monospace; white-space: nowrap;
min-width: 28px; text-align: center;
}
.mu-btn:hover { border-color: var(–accent); color: var(–accent); }
.mu-btn.active { background: var(–accent); color: #000; border-color: var(–accent); font-weight: 700; }
.mu-btn.eraser.active { background: #ff4d6d; border-color: #ff4d6d; color: #fff; }
.mu-sep { width: 1px; height: 20px; background: #333; margin: 0 0.2rem; flex-shrink: 0; }
.mu-color-swatch { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #555; cursor: pointer; flex-shrink: 0; transition: border-color 0.15s; }
.mu-color-swatch:hover { border-color: #fff; }
#muColorInput { width: 0; height: 0; opacity: 0; position: absolute; }
.mu-size-input { width: 38px; background: #222; border: 1px solid #444; border-radius: 4px; color: #ccc; font-size: 0.62rem; text-align: center; padding: 0.18rem 0; font-family: ‘Space Mono’, monospace; }
.mu-label { font-family: ‘Space Mono’, monospace; font-size: 0.58rem; color: #666; }

/* ── Markup canvas overlay on each page ── */
.markup-canvas { position: absolute; top: 0; left: 0; cursor: crosshair; z-index: 10; touch-action: none; pointer-events: none; }
@media (max-width: 600px) {
.pdf-topbar { flex-wrap: wrap; min-height: unset; padding: 0.4rem; gap: 0.3rem; }
.pdf-title-bar { display: none; }
.topbar-right { flex-wrap: wrap; gap: 0.2rem; }
.topbar-action { font-size: 0.58rem; padding: 0.2rem 0.35rem; }
.back-btn-v { font-size: 0.6rem; padding: 0.2rem 0.4rem; }
.pdf-page-nav .page-info { min-width: 3rem; font-size: 0.58rem; }
}
/* Mobile-only download button */
.topbar-dl-mobile { display: none; }
@media (max-width: 700px) {
.topbar-dl-mobile {
display: inline-flex !important;
background: rgba(34,197,94,0.15) !important;
border-color: #22c55e !important;
color: #22c55e !important;
}
.topbar-dl-mobile:hover { background: #22c55e !important; color: #000 !important; }
}
.topbar-action {
background: #1e1e1e; border: 1px solid #555; border-radius: 6px;
color: #ccc; font-size: 0.68rem; padding: 0.3rem 0.65rem;
cursor: pointer; white-space: nowrap; font-family: ‘Space Mono’, monospace;
transition: all 0.2s; font-weight: 600;
}
.topbar-action:hover { border-color: var(–accent); color: var(–accent); background: rgba(0,229,255,0.06); }

/* ── File chip bar (inline in topbar) ── */
.file-chip-bar-inline {
display: flex; flex-wrap: wrap; gap: 0.3rem;
align-items: center; flex-shrink: 0;
}

<script>
  const _isAndroid = /android/i.test(navigator.userAgent);
  if (_isAndroid) document.body.classList.add('android');

  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  try { if (localStorage.getItem('pp_theme') === 'light') document.body.classList.add('light'); } catch {}

  const params  = new URLSearchParams(window.location.search);
  const pdfUrl  = params.get('url');

  var pdfDoc = null, curPage = 1, totalPages = 0;
  var _scale = null;
  var _files = [];
  var _aiFileList = '';
  var _msText = '';  // Background MS text for AI
  var _allFilesText = {};  // All fetched file texts keyed by label
  var _pdfText = [];
  var _aiHistory = [];
  var _aiCollapsed = false;

  // ── Init ──
  if (!pdfUrl) {
    document.getElementById('pdfLoadMsg').textContent = 'No PDF URL provided.';
  } else {
    const title = examTitle(pdfUrl);
    document.getElementById('pdfTitle').textContent = title;
    document.title = title + ' — PaperFinder';
    openFile(pdfUrl);
    loadRelatedFiles(pdfUrl);
    loadChatHistory(pdfUrl);
  }

  // ── PDF loading ──
  async function loadPdf(url) {
    const area = document.getElementById('pdfCanvasArea');
    const msg  = document.getElementById('pdfLoadMsg');
    pdfDoc = null; _pdfText = []; curPage = 1; totalPages = 0;
    document.getElementById('thumbSidebar').innerHTML = '';

    try {
      const proxyUrl = '/api/download-pdf?url=' + encodeURIComponent(url);

      if (_isAndroid) {
        // ── Android: use PDF.js canvas rendering ──
        // Remove only old page containers, not the loading msg element
        area.querySelectorAll('.pdf-page-container').forEach(el => el.remove());
        msg.style.display = 'flex';
        msg.textContent = 'Loading PDF…';

        const resp = await fetch(proxyUrl);
        if (!resp.ok) throw new Error('Could not fetch PDF (' + resp.status + ')');
        const buf = await resp.arrayBuffer();

        // Clear any pages that rendered while fetching (rapid switch guard)
        area.querySelectorAll('.pdf-page-container').forEach(el => el.remove());

        pdfDoc = await pdfjsLib.getDocument({ data: buf }).promise;
        totalPages = pdfDoc.numPages;
        msg.style.display = 'none';

        for (let i = 1; i <= totalPages; i++) {
          await renderPageAppend(i);
        }
      } else {
        // ── Desktop/iOS: direct URL in object > embed > iframe ──
        // Use direct URL (not proxy) — same as before PDF.js changes
        msg.style.display = 'none';
        area.innerHTML = '';

        // Destroy the entire canvas area and replace it with a fresh node
        // This is the only reliable way to force all browsers to load a new file
        const newArea = document.createElement('div');
        newArea.id = 'pdfCanvasArea';
        newArea.className = area.className;
        newArea.innerHTML =
          '<div class="pdf-loading-msg" id="pdfLoadMsg" style="display:none"></div>' +
          '<object data="' + url + '" type="application/pdf" width="100%" height="100%" style="display:block;border:none;width:100%;height:100%">' +
            '<embed src="' + url + '" type="application/pdf" width="100%" height="100%" />' +
            '<iframe src="' + url + '" width="100%" height="100%" style="border:none">' +
              'Your browser does not support PDFs. <a href="' + url + '">Download the PDF</a>.' +
            '</iframe>' +
          '</object>';
        area.parentNode.replaceChild(newArea, area);

        // Background: PDF.js for text extraction only
        try {
          const resp = await fetch(proxyUrl);
          if (resp.ok) {
            const buf = await resp.arrayBuffer();
            pdfDoc = await pdfjsLib.getDocument({ data: buf }).promise;
            totalPages = pdfDoc.numPages;
          }
        } catch {}
      }

      extractText();
      loadRelatedFiles(url);

    } catch (e) {
      msg.style.display = 'flex';
      msg.textContent = 'Could not load PDF: ' + e.message;
    }
  }

  async function renderPageAppend(n) {
    const page   = await pdfDoc.getPage(n);
    const area   = document.getElementById('pdfCanvasArea');
    const dpr    = window.devicePixelRatio || 1;
    const baseVp = page.getViewport({ scale: 1 });
    const availW  = area.clientWidth - 16; // 8px padding each side
    const autoSc  = Math.min(2.2, availW / baseVp.width) || 1.4;
    const sc     = _scale || autoSc;
    const vp     = page.getViewport({ scale: sc });

    const wrap = document.createElement('div');
    wrap.className = 'pdf-page-container';
    wrap.id = 'page-wrap-' + n;
    wrap.dataset.page = n;
    wrap.style.width  = vp.width  + 'px';
    wrap.style.height = vp.height + 'px';

    const canvas = document.createElement('canvas');
    const ctx    = canvas.getContext('2d');
    canvas.width  = Math.floor(vp.width  * dpr);
    canvas.height = Math.floor(vp.height * dpr);
    canvas.style.width  = vp.width  + 'px';
    canvas.style.height = vp.height + 'px';
    ctx.scale(dpr, dpr);
    wrap.appendChild(canvas);

    const textDiv = document.createElement('div');
    textDiv.className = 'textLayer';
    textDiv.style.width  = vp.width  + 'px';
    textDiv.style.height = vp.height + 'px';
    wrap.appendChild(textDiv);
    area.appendChild(wrap);

    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    await page.render({ canvasContext: ctx, viewport: vp }).promise;
    const tc = await page.getTextContent();
    pdfjsLib.renderTextLayer({ textContent: tc, container: textDiv, viewport: vp, textDivs: [] });

    // Markup canvas overlay
    const muCanvas = document.createElement('canvas');
    muCanvas.className = 'markup-canvas';
    muCanvas.width  = canvas.width;
    muCanvas.height = canvas.height;
    muCanvas.style.width  = vp.width + 'px';
    muCanvas.style.height = vp.height + 'px';
    muCanvas.dataset.page = n;
    wrap.appendChild(muCanvas);
    initMarkupCanvas(muCanvas);
    // Restore saved markup for this page
    restoreMarkup(muCanvas, n);
  }

  async function buildThumb(n) {
    const page = await pdfDoc.getPage(n);
    const vp   = page.getViewport({ scale: 0.18 });
    const item = document.createElement('div');
    item.className = 'thumb-item' + (n === 1 ? ' active' : '');
    item.id = 'thumb-' + n;
    item.onclick = () => scrollToPage(n);
    const c = document.createElement('canvas');
    c.width  = vp.width;
    c.height = vp.height;
    item.appendChild(c);
    const num = document.createElement('div');
    num.className = 'thumb-num';
    num.textContent = n;
    item.appendChild(num);
    document.getElementById('thumbSidebar').appendChild(item);
    await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;
  }

  function scrollToPage(n) {
    const wrap = document.getElementById('page-wrap-' + n);
    if (wrap) wrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function setupScrollObserver() {
    const area = document.getElementById('pdfCanvasArea');
    const obs = new IntersectionObserver(entries => {
      let mostVisible = null, maxRatio = 0;
      entries.forEach(e => {
        if (e.isIntersecting && e.intersectionRatio > maxRatio) {
          maxRatio = e.intersectionRatio; mostVisible = e.target;
        }
      });
      if (mostVisible) {
        const n = parseInt(mostVisible.dataset.page);
        if (n !== curPage) { curPage = n; updatePageInfo(); updateThumbActive(); }
      }
    }, { root: area, threshold: [0.3, 0.6] });
    area.querySelectorAll('.pdf-page-container').forEach(el => obs.observe(el));
  }

  function updatePageInfo() {
    // page info display removed
  }
  function updateThumbActive() {
    document.querySelectorAll('.thumb-item').forEach(t => t.classList.toggle('active', parseInt(t.id.split('-')[1]) === curPage));
    const at = document.getElementById('thumb-' + curPage);
    if (at) at.scrollIntoView({ block: 'nearest' });
  }

  function prevPage() {
    if (!pdfDoc || curPage <= 1) return;
    scrollToPage(curPage - 1);
  }
  function nextPage() {
    if (!pdfDoc || curPage >= totalPages) return;
    scrollToPage(curPage + 1);
  }

  // ── Zoom ──
  function zoomIn()  { _scale = ((_scale || 1.4) * 1.2); rebuildPages(); }
  function zoomOut() { _scale = ((_scale || 1.4) / 1.2); if (_scale < 0.3) _scale = 0.3; rebuildPages(); }
  async function rebuildPages() {
    if (!pdfDoc) return;
    const area = document.getElementById('pdfCanvasArea');
    area.querySelectorAll('.pdf-page-container').forEach(el => el.remove());
    for (let i = 1; i <= totalPages; i++) await renderPageAppend(i);
    setupScrollObserver();
    scrollToPage(curPage);
  }

  // ── File handling ──
  function isAudio(url) { return url.endsWith('.mp3') || url.endsWith('.wav') || url.includes('_sf_') || url.includes('_sf.'); }

  function openFile(url) {
    document.getElementById('pdfTitle').textContent = examTitle(url);
    // Update chip active states
    renderFileChips(_files, url);
    if (isAudio(url)) {
      document.getElementById('audioArea').classList.add('show');
      document.getElementById('pdfCanvasArea').style.display = 'none';
      document.getElementById('thumbSidebar').style.display = 'none';
      document.getElementById('audioFilename').textContent = url.split('/').pop();
      const audioArea = document.getElementById('audioArea');
      const prev = audioArea.querySelector('audio');
      if (prev) prev.remove();
      // Remove previous audio if present
      const _oldAudio = audioArea.querySelector('audio');
      if (_oldAudio) _oldAudio.remove();
      audioArea.innerHTML += '<audio controls autoplay muted loop><source src="/api/download-pdf?url=' + encodeURIComponent(url) + '">This browser does not support HTML5 audio</audio>';
    } else {
      document.getElementById('audioArea').classList.remove('show');
      document.getElementById('pdfCanvasArea').style.display = '';
      document.getElementById('thumbSidebar').style.display = '';
      loadPdf(url);
    }
  }

  function examTitle(url, typeLabel) {
    const f = url.split('/').pop().replace(/\.(pdf|mp3)$/i, '');
    // Pattern: XXXX_s25_qp_11  or  XXXX_s25_gt  etc.
    const m = f.match(/^(\d{4})_([smw])(\d{2})_([a-z]+)(?:_(\d{1,2}))?$/i);
    if (!m) return f + (typeLabel ? ' ' + typeLabel.toUpperCase() : '');
    const [, code, sess, yr, type, variant] = m;
    const sessMap = { s: 'm/j', w: 'o/n', m: 'f/m' };
    const sessStr = sessMap[sess.toLowerCase()] || sess;
    const varStr  = variant ? '/' + parseInt(variant) : '';
    const typeStr = type.toUpperCase();
    return code + varStr + '/' + sessStr + '/' + yr + ' ' + typeStr;
  }

  function renderFileChips(files, activeUrl) {
    const bar = document.getElementById('fileChipBar');
    if (!files || files.length <= 1) { bar.innerHTML = ''; return; }
    bar.innerHTML = files.map(f => {
      const cls = 'file-chip' + (isAudio(f.url) ? ' audio' : '') + (f.url === activeUrl ? ' active' : '');
      return '<button class="' + cls + '" data-url="' + f.url + '" onclick="openFile(this.dataset.url)">' + f.label + '</button>';
    }).join('');
  }

  async function loadRelatedFiles(url) {
    const m = url.match(/upload\/([^/]+)\.(pdf|mp3)$/i);
    if (!m) return;
    const base = m[1];
    const p = base.match(/^(\d{4}_[smw]\d{2})_([a-z]+)(?:_(\d{1,2}))?$/i);
    if (!p) return;
    const [, prefix, , variant] = p;
    const baseUrl = url.substring(0, url.lastIndexOf('/') + 1);
    const noVariant = new Set(['gt','gb','er','sp','sm','sg']);
    const allTypes  = ['qp','ms','in','ci','er','gt','gb','rp','sf'];
    const variantInt = variant ? parseInt(variant) : null;
    const candidates = [];
    for (const t of allTypes) {
      if (noVariant.has(t)) {
        candidates.push({ t, url: baseUrl + prefix + '_' + t + '.pdf', audio: false });
      } else if (variantInt !== null) {
        const vPad = String(variantInt).padStart(2,'0');
        const audio = t === 'sf';
        candidates.push({ t, url: baseUrl + prefix + '_' + t + '_' + vPad + (audio ? '.mp3' : '.pdf'), audio });
      }
    }
    const results = await Promise.allSettled(
      candidates.map(c => fetch('/api/check-pdf?url=' + encodeURIComponent(c.url)).then(r => r.json()).then(d => ({...c, exists: d.exists})))
    );
    _files = [];
    for (const r of results) {
      if (r.status === 'fulfilled' && r.value.exists) {
        const f = r.value;
        const vSuffix = variantInt !== null && !f.audio && !noVariant.has(f.t) ? ' v'+variantInt : '';
        _files.push({ label: f.t.toUpperCase() + vSuffix, url: f.url, audio: f.audio });
      }
    }
    if (!_files.find(f => f.url === url)) _files.unshift({ label: examTitle(url), url, audio: isAudio(url) });
    renderFileChips(_files, url);
    _aiFileList = _files.map(f => f.label).join(', ');

    // Fetch MS for AI — always use the MS file URL regardless of what's currently open
    _allFilesText = {};
    _msText = '';
    const msFile = _files.find(f => !f.audio && f.label && f.label.toUpperCase().startsWith('MS'));
    if (msFile) {
      fetchMsBackground(msFile.url);
    } else {
      // Fallback: derive MS URL from any file URL in the set
      const anyUrl = _files.length ? _files[0].url : url;
      const msUrlDerived = anyUrl.replace(/_qp_/i, '_ms_').replace(/_ms_/i, '_ms_').replace(/_in_/i, '_ms_').replace(/_ci_/i, '_ms_');
      const qpUrl = _files.find(f => f.label && f.label.toUpperCase().startsWith('QP'));
      const sourceUrl = qpUrl ? qpUrl.url : anyUrl;
      const msDerived = sourceUrl.replace(/_qp_/i, '_ms_').replace(/_in_/i, '_ms_').replace(/_ci_/i, '_ms_');
      if (msDerived !== sourceUrl) fetchMsBackground(msDerived);
    }
  }

  async function fetchMsBackground(msUrl) {
    await fetchFileForAI(msUrl, 'MS');
    _msText = _allFilesText['MS'] || '';
    if (_msText) console.log('[PaperAI] MS loaded, chars:', _msText.length);
    else console.log('[PaperAI] MS fetch failed');
  }

  // Clean extracted page text — strip boilerplate, barcodes, legal text
  function cleanPageText(raw) {
    // Skip pages containing BLANK PAGE
    if (/BLANK\s*PAGE/i.test(raw)) return null;

    // Strip known boilerplate strings
    const boilerplate = [
      /©\s*UCLES[^\n]*/gi,
      /\[Turn over\]/gi,
      /DO NOT WRITE IN THIS MARGIN/gi,
      /BLANK PAGE/gi,
      // Long Cambridge copyright paragraph
      /Permission to reproduce items where third-party owned material[\s\S]*?University of Cambridge\.?/gi,
      // Barcode patterns — sequences of only digits/spaces 8+ chars with no letters
      /\b(?![01\s]+\b)\d[\d\s]{7,}\b/g,  // allow binary (CS exams)
    ];
    let text = raw;
    for (const pat of boilerplate) text = text.replace(pat, ' ');

    // Remove standalone dots and asterisks
    text = text.split(' ').filter(w => w !== '.' && w !== '*' && w.trim() !== '').join(' ');

    // Collapse multiple spaces
    text = text.replace(/\s{2,}/g, ' ').trim();

    return text.length > 10 ? text : null;  // discard near-empty pages
  }

  async function fetchFileForAI(fileUrl, label) {
    try {
      const ab = await fetch('/api/download-pdf?url=' + encodeURIComponent(fileUrl)).then(r => r.ok ? r.arrayBuffer() : null);
      if (!ab) return;
      const doc = await pdfjsLib.getDocument({ data: ab }).promise;
      const pages = [];
      for (let i = 2; i <= doc.numPages; i++) {  // skip page 1
        const pg = await doc.getPage(i);
        const tc = await pg.getTextContent();
        const rawFetch = tc.items.map(s => s.str).join(' ');
        const cleanedFetch = cleanPageText(rawFetch);
        if (cleanedFetch) pages.push(cleanedFetch);
      }
      _allFilesText[label] = pages.join('\n\n---\n\n');
      console.log('[PaperAI] ' + label + ' loaded, chars:', _allFilesText[label].length);
    } catch (e) {
      console.log('[PaperAI] Failed to fetch ' + label + ':', e.message);
    }
  }

  // ── Text extraction for AI ──
  async function extractText() {
    if (!pdfDoc) return;
    _pdfText = [];
    for (let i = 1; i <= pdfDoc.numPages; i++) {
      const pg = await pdfDoc.getPage(i);
      const tc = await pg.getTextContent();
      const rawQp = tc.items.map(s => s.str).join(' ');
      const cleanedQp = cleanPageText(rawQp);
      if (cleanedQp) _pdfText.push(cleanedQp);
    }
    const h = document.getElementById('aiHint');
    h.innerHTML = "Suggested: <span onclick=\"aiAsk('Summarise this paper')\">Summarise</span> &middot; <span onclick=\"aiAsk('What topics does this cover?')\">Topics</span> &middot; <span onclick=\"aiAsk('Explain question 1')\">Q1</span>";
  }

  function fmtT(s) { const m=Math.floor(s/60),sc=Math.floor(s%60); return m+':'+(sc<10?'0':'')+sc; }


  // ── AI panel toggle ──
  function toggleAiPanel() {

    } else {

  // ── AI chat ──
  function renderMd(text) {
    return text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,'<em>$1</em>')
      .replace(/`(.+?)`/g,'<code style="background:rgba(0,229,255,.1);padding:.1em .3em;border-radius:3px">$1</code>')
      .replace(/^#{1,3}\s+(.+)$/gm,'<div style="font-weight:700;font-size:.85rem;color:var(--accent);margin:.3em 0">$1</div>')
      .replace(/^[-*]\s+(.+)$/gm,'<div style="padding-left:.8em">&#8226; $1</div>')
      .replace(/^(\d+)\.\s+(.+)$/gm,'<div style="padding-left:.8em">$1. $2</div>')
      .replace(/\n/g,'<br>');
  }

  function addAiMsg(role, text) {
    const div = document.createElement('div');
    div.className = 'ai-msg ' + role;
    if (role === 'ai' && text) div.innerHTML = renderMd(text);
    else div.textContent = text;
    document.getElementById('aiMessages').appendChild(div);
    scrollAi();
    return div;
  }

  function aiAsk(q) { document.getElementById('aiInput').value = q; sendAiMsg(); }

  async function sendAiMsg() {
    const input = document.getElementById('aiInput');
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    addAiMsg('user', msg);
    _aiHistory.push({ role: 'user', content: msg });
    const btn = document.getElementById('aiSendBtn');
    btn.disabled = true;
    const aiDiv = addAiMsg('ai', '');
    aiDiv.classList.add('streaming');

    try {
      // Build context — cap at 30,000 chars total to avoid 413 errors
      const fileCtx = _aiFileList ? 'Available files for this paper: ' + _aiFileList + '\n\n' : '';
      const qpRaw   = _pdfText.length ? _pdfText.join('\n\n---\n\n') : '';
      const msRaw   = _msText || '';

      const qpCtx = qpRaw.length
        ? 'QUESTION PAPER TEXT:\n\n' + qpRaw
        : 'No question paper text could be extracted.';
      const msCtx = msRaw.length
        ? '\n\n--- MARK SCHEME ---\n(Only state marks that appear here.)\n\n' + msRaw
        : '\n\n--- MARK SCHEME ---\nNot available for this paper.';

      const context = fileCtx + qpCtx + msCtx;
      console.log('[AI] context chars:', context.length);

      const selectedModel = (document.getElementById('aiModelSelect') || {}).value || 'groq-llama';
      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: _aiHistory, context, url: pdfUrl, model: selectedModel })
      });

      if (!resp.ok) {
        if (resp.status === 429) {
          let msg = 'Rate limit reached on all keys — please switch to a different model using the selector above.';
          try { const d = await resp.json(); if (d.error) msg = d.error; } catch {}
          throw new Error(msg);
        }
        if (resp.status === 401) throw new Error('Invalid API key.');
        throw new Error('API error ' + resp.status);
      }

      const reader  = resp.body.getReader();
      const decoder = new TextDecoder();
      let full = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        for (const line of decoder.decode(value).split('\n')) {
          if (line.startsWith('data: ') && line !== 'data: [DONE]') {
            try {
              const d = JSON.parse(line.slice(6));
              const delta = d.delta && d.delta.text ? d.delta.text : '';
              if (delta) { full += delta; aiDiv.innerHTML = renderMd(full); scrollAi(); }
            } catch {}
          }
        }
      }
      aiDiv.classList.remove('streaming');
      if (!full) aiDiv.textContent = 'No response.';
      _aiHistory.push({ role: 'assistant', content: full });
      saveChatHistory();
    } catch (e) {
      aiDiv.classList.remove('streaming');
      aiDiv.textContent = 'Error: ' + e.message;
    }
    btn.disabled = false;
    input.focus();
  }

  function scrollAi() { const m = document.getElementById('aiMessages'); m.scrollTop = m.scrollHeight; }
  const _welcomeMsg = 'Hi! I\'m PastPaperAI 🎓<br><br>Ask me anything about this paper — I can explain questions, summarise topics &amp; check your answers against the mark scheme.<br><br><span style="font-size:0.62rem;color:var(--muted)">PastPaperAI can make mistakes. Reference only.</span>';

  function clearAiChat() {
    document.getElementById('aiMessages').innerHTML = '<div class="ai-msg ai">' + _welcomeMsg + '</div>';
    _aiHistory.length = 0;
    if (_sessionToken && pdfUrl) saveChatHistory();
  }

  async function loadChatHistory(url) {
    if (!_sessionToken || !url) return;
    try {
      const r = await fetch('/api/user-data', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-session-token': _sessionToken },
        body: JSON.stringify({ action: 'get_chat', token: _sessionToken, paperUrl: url })
      });
      const d = await r.json();
      const rawMsgs = d.messages;
      const msgs = typeof rawMsgs === 'string' ? JSON.parse(rawMsgs) : (Array.isArray(rawMsgs) ? rawMsgs : []);
      if (msgs.length > 0) {
        _aiHistory = msgs;
        const box = document.getElementById('aiMessages');
        box.innerHTML = '<div class="ai-msg ai">' + _welcomeMsg + '</div>';
        for (const m of msgs) {
          const div = document.createElement('div');
          div.className = 'ai-msg ' + (m.role === 'assistant' ? 'ai' : 'user');
          if (m.role === 'assistant') div.innerHTML = renderMd(m.content);
          else div.textContent = m.content;
          box.appendChild(div);
        }
        box.scrollTop = box.scrollHeight;
      }
    } catch {}
  }

  async function saveChatHistory() {
    if (!_sessionToken || !pdfUrl) return;
    try {
      await fetch('/api/user-data', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-session-token': _sessionToken },
        body: JSON.stringify({ action: 'save_chat', token: _sessionToken, paperUrl: pdfUrl, messages: _aiHistory })
      });
    } catch {}
  }

  function goBack() { sessionStorage.setItem('fromCodes','1'); window.location.href = '/'; }

    else { navigator.clipboard.writeText(shareUrl).then(() => { const b = document.querySelector('.topbar-action[onclick="sharePaper()"]'); if (b) { const o=b.innerHTML; b.innerHTML='&#10003; Copied'; setTimeout(()=>b.innerHTML=o,1500); } }); }

  if (window.innerWidth <= 700) {
