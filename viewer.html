  /* ── Theme toggle ── */
  .header-top-row {
    display: flex;

    margin-bottom: 0.1rem;
  }
  /* ── Cosmic theme toggle ── */
  .cosmic-toggle {
    position: relative;
    width: 80px;
    height: 40px;
    transform-style: preserve-3d;
    perspective: 500px;
    margin-left: auto;
    flex-shrink: 0;
  }
  .toggle { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute;
    cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(45deg, #1a1a2e, #16213e);
    border-radius: 35px;
    transition: 0.5s;
    transform-style: preserve-3d;
    box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 0 15px rgba(255,255,255,0.05);
    overflow: hidden;

  .cosmos {

      radial-gradient(2px 2px at 30% 30%, #fff 100%, transparent),
      radial-gradient(1px 1px at 40% 40%, #fff 100%, transparent),
      radial-gradient(2px 2px at 50% 50%, #fff 100%, transparent),
      radial-gradient(1px 1px at 60% 60%, #fff 100%, transparent),
      radial-gradient(2px 2px at 70% 70%, #fff 100%, transparent),

  .toggle-orb {

    border-radius: 50%;

    transform-style: preserve-3d;
    z-index: 2;

  .inner-orb {
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    background: linear-gradient(145deg, #fff, #e6e6e6);
    transition: 0.5s;
    overflow: hidden;
  }
  .inner-orb::before {
    content: "";
    position: absolute;
    inset: 0;
    background: repeating-conic-gradient(from 0deg, transparent 0deg, rgba(0,0,0,0.1) 10deg, transparent 20deg);
    animation: patternRotate 10s linear infinite;
  }
  .ring {
    position: absolute;
    inset: -3px;
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 50%;
    transition: 0.5s;
  }
  .toggle:checked + .slider { background: linear-gradient(45deg, #16213e, #1a1a2e); }
  .toggle:checked + .slider .toggle-orb {
    transform: translateX(40px) rotate(360deg);
    background: linear-gradient(145deg, #4ecdc4, #45b7af);
  }
  .toggle:checked + .slider .inner-orb {
    background: linear-gradient(145deg, #45b7af, #3da89f);
    transform: scale(0.9);
  }
  .toggle:checked + .slider .ring {
    border-color: rgba(78,205,196,0.3);
    animation: ringPulse 2s infinite;
  }
  .energy-line {
    position: absolute;
    width: 100%; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(78,205,196,0.5), transparent);
    transform-origin: left;
    opacity: 0;
    transition: 0.5s;

  .energy-line:nth-child(1) { top: 20%; transform: rotate(15deg); }
  .energy-line:nth-child(2) { top: 50%; transform: rotate(0deg); }
  .energy-line:nth-child(3) { top: 80%; transform: rotate(-15deg); }
  .toggle:checked + .slider .energy-line { opacity: 1; animation: energyFlow 2s linear infinite; }
  .particles { position: absolute; width: 100%; height: 100%; }
  .particle {
    position: absolute;
    width: 4px; height: 4px;
    background: #4ecdc4;
    border-radius: 50%;
    opacity: 0;
  }
  .toggle:checked + .slider .particle { animation: particleBurst 1s ease-out infinite; }
  .particle:nth-child(1) { left: 20%; animation-delay: 0s; }
  .particle:nth-child(2) { left: 40%; animation-delay: 0.2s; }
  .particle:nth-child(3) { left: 60%; animation-delay: 0.4s; }
  .particle:nth-child(4) { left: 80%; animation-delay: 0.6s; }
  .particle:nth-child(5) { left: 30%; animation-delay: 0.8s; }
  .particle:nth-child(6) { left: 70%; animation-delay: 1s; }
  @keyframes ringPulse {

  @keyframes patternRotate {
    0% { transform: rotate(0deg); }

  @keyframes energyFlow {
    0% { transform: scaleX(0) translateX(0); opacity: 0; }

    100% { transform: scaleX(0) translateX(100%); opacity: 0; }

  @keyframes particleBurst {

  /* ── Poda glow animation around card ── */
  .card {
    background: var(--surface);

    border-radius: 16px;
    padding: 1.5rem;
    position: relative;
    overflow: visible;

  .card-glow {

    pointer-events: none;
    overflow: hidden;
  }
  .card-glow::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 800px; height: 800px;
    transform: translate(-50%, -50%) rotate(0deg);
    background-image: conic-gradient(
      transparent 0%,
      var(--accent) 8%,
      transparent 15%,
      transparent 50%,
      var(--accent2) 58%,
      transparent 65%

  .card-glow::after {

  @keyframes cardGlowRotate {

  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

  /* ── Generate button (animated fill) ── */
  .btn-generate {

  .btn-row { display: flex; gap: 0.6rem; margin-top: 0.8rem; align-items: stretch; }

  .btn-copy:active { transform: translateY(0); box-shadow: none; }

  .error-msg {
    margin-top: 1rem;
    background: rgba(255,77,109,0.1);
    border: 1px solid var(--accent2);
    border-radius: 8px;
    padding: 0.8rem 1rem;

    font-size: 0.75rem;

  .error-msg .bypass-row {

  .bypass-warning {
    font-size: 0.65rem;
    color: var(--muted);

  /* \u2500\u2500 CODES VIEW \u2500\u2500 */
  

  .top-bar {
    max-width: 1100px;
    margin: 0 auto 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .back-btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    color: var(--accent);
    background: none;

  .page-title { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.02em; }
  .page-title span { color: var(--accent); }

  /* ── Search box poda glow ── */
  .search-wrap {
    max-width: 1100px;
    margin: 0 auto 1.5rem;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* spinning border layers */
  .search-glow,
  .search-border,
  .search-dark-border {
    position: absolute;
    inset: 0;
    border-radius: 10px;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }
  .search-dark-border::before,
  .search-glow::before,
  .search-border::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 800px; height: 800px;
    background-repeat: no-repeat;
  }
  .search-dark-border {
    inset: -1px;
    border-radius: 10px;
  }
  .search-dark-border::before {
    transform: translate(-50%, -50%) rotate(82deg);
    background-image: conic-gradient(
      rgba(0,0,0,0),
      rgba(0,229,255,0.4),
      rgba(0,0,0,0) 10%,
      rgba(0,0,0,0) 50%,
      rgba(255,77,109,0.4),
      rgba(0,0,0,0) 60%
    );
    animation: searchSpin 4s linear infinite;
  }
  .search-border {
    inset: -1px;
    filter: blur(0.5px);
  }
  .search-border::before {
    transform: translate(-50%, -50%) rotate(70deg);
    background-image: conic-gradient(
      var(--bg),
      var(--accent) 5%,
      var(--bg) 14%,
      var(--bg) 50%,
      var(--accent2) 60%,
      var(--bg) 64%
    );
    animation: searchSpin 4s 0.1s linear infinite;
  }
  .search-glow {
    inset: -3px;
    filter: blur(8px);
    opacity: 0.5;
  }
  .search-glow::before {
    transform: translate(-50%, -50%) rotate(60deg);
    background-image: conic-gradient(
      #000,
      var(--accent) 5%,
      #000 38%,
      #000 50%,
      var(--accent2) 60%,
      #000 87%
    );
    animation: searchSpin 4s 0.3s linear infinite;
  }
  /* inner mask to show only border */
  .search-wrap::after {
    content: '';
    position: absolute;
    inset: 2px;
    border-radius: 8px;
    background: var(--surface);
    z-index: 1;
    pointer-events: none;
  }
  @keyframes searchSpin {
    100% { transform: translate(-50%, -50%) rotate(450deg); }
  }
  @keyframes boardGlowSpin {
    100% { transform: translate(-50%, -50%) rotate(-450deg); }
  }
  .search-input {
    position: relative;
    z-index: 2;
    width: 100%;
    background: transparent;
    border: none;
    border-radius: 8px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    padding: 0.7rem 1rem;
    outline: none;
  }
  .search-input::placeholder { color: var(--muted); }

  .codes-grid {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
  }

  .codes-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    position: relative;
  }
  .codes-section::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .caie-sec::before { background: linear-gradient(90deg, var(--accent), #0070ff); }
  .aqa-sec::before  { background: linear-gradient(90deg, var(--accent2), #ff9900); }

  .sec-header { padding: 1rem 1.2rem; border-bottom: 1px solid var(--border); }
  .sec-title { font-size: 0.95rem; font-weight: 800; letter-spacing: 0.04em; }
  .caie-sec .sec-title { color: var(--accent); }
  .aqa-sec  .sec-title { color: var(--accent2); }
  .sec-sub { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--muted); margin-top: 0.2rem; }

  .cat-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0.6rem 1.2rem 0.3rem;
    border-top: 1px solid var(--border);
  }
  .cat-label:first-of-type { border-top: none; }

  .code-table { width: 100%; border-collapse: collapse; }
  .code-table tr { transition: background 0.12s; cursor: pointer; }
  .code-table tr:hover { background: rgba(255,255,255,0.04); }
  .code-table td { padding: 0.38rem 1.2rem; font-size: 0.8rem; line-height: 1.4; }

  .c-code {
    font-family: 'Space Mono', monospace;
    font-size: 0.76rem;
    width: 70px;
    white-space: nowrap;
  }
  .caie-sec .c-code { color: var(--accent); }
  .aqa-sec  .c-code { color: var(--accent2); }
  .c-name { color: var(--text); }

  .hidden-row { display: none; }

  /* Responsive */
  @media (max-width: 680px) {
    .codes-grid { grid-template-columns: 1fr; }
    h1 { font-size: 1.8rem; }
    .row-2 { grid-template-columns: 1fr; }
    .page-title { font-size: 1.2rem; }
  }

  /* ── Hide variant when GT selected ── */
  .variant-hidden { display: none !important; }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    15%       { transform: translateX(-6px); }
    30%       { transform: translateX(6px); }
    45%       { transform: translateX(-5px); }
    60%       { transform: translateX(5px); }
    75%       { transform: translateX(-3px); }
    90%       { transform: translateX(3px); }
  }

  /* ── Field error highlight ── */
  .field input.field-error,
  .field select.field-error {
    border-color: var(--accent2) !important;
    box-shadow: 0 0 0 3px rgba(255,77,109,0.15) !important;
    animation: shake 0.45s ease;
  }

  /* ── Subject name tag ── */
  .subject-name-tag {
    display: none;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    margin-top: 0.35rem;
    padding: 0.25rem 0.5rem;
    background: rgba(0,229,255,0.07);
    border-radius: 4px;
    border: 1px solid rgba(0,229,255,0.2);
  }
  .subject-name-tag.visible { display: inline-block; }

  .did-you-mean {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    margin-top: 0.35rem;
    color: rgba(255,255,255,0.55);
  }
  .did-you-mean span {
    color: var(--accent);
    cursor: pointer;
    text-decoration: underline;
    font-weight: 700;
  }
  .did-you-mean span:hover { color: #fff; }

  .code-suggestions {
    position: absolute;
    top: 100%;
    left: 0; right: 0;
    background: #1a1a24;
    border: 1px solid rgba(0,229,255,0.25);
    border-radius: 6px;
    max-height: 220px;
    overflow-y: auto;
    z-index: 100;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    display: none;
  }
  .code-suggestions.open { display: block; }
  .code-suggestions::-webkit-scrollbar { width: 4px; }
  .code-suggestions::-webkit-scrollbar-track { background: transparent; }
  .code-suggestions::-webkit-scrollbar-thumb { background: rgba(0,229,255,0.2); border-radius: 2px; }
  .suggestion-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.55rem 0.75rem;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.12s;
  }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover, .suggestion-item.active {
    background: rgba(0,229,255,0.08);
  }
  .suggestion-code {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    min-width: 3rem;
    font-weight: 700;
  }
  .suggestion-name {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.65);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .suggestion-highlight { color: #fff; }

  /* ── Recent searches ── */
  .recent-box { margin-bottom: 1.2rem; display: none; }
  .recent-box.visible { display: block; }
  .recent-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .recent-clear {
    background: none; border: none; color: var(--muted);
    font-family: 'Space Mono', monospace; font-size: 0.6rem;
    cursor: pointer; letter-spacing: 0.1em;
  }
  .recent-clear:hover { color: var(--accent2); }
  .recent-chevron {
    font-size: 0.65rem;
    color: var(--accent);
    transition: transform 0.15s;
    display: inline-block;
  }
  .recent-list { display: flex; flex-direction: column; gap: 0.4rem; margin-top: 0.4rem; }
  .recent-item {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.45rem 0.7rem;
    cursor: pointer;
    transition: background 0.15s;
    gap: 0.5rem;
  }
  .recent-item:hover { background: rgba(0,229,255,0.05); border-color: rgba(0,229,255,0.2); }
  .recent-item-url {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    flex: 1; min-width: 0;
    letter-spacing: 0.02em;
  }
  .recent-item-open {
    font-family: 'Space Mono', monospace; font-size: 0.6rem;
    color: var(--accent); white-space: nowrap; flex-shrink: 0;
  }

  /* ── Download btn ── */
  .btn-download {
    flex: 1; padding: 0.6rem; border-radius: 7px;
    border: 1px solid var(--border);
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.8rem;
    cursor: pointer;
    background: transparent; color: var(--text);
    transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1),
                border-color 0.2s ease,
                box-shadow 0.2s ease;
  }
  .btn-download:hover {
    transform: translateY(2px);
    border-color: var(--accent);
    box-shadow: 0 3px 12px rgba(0,229,255,0.15);
  }
  .btn-download:active { transform: translateY(0); }




  .header-title-row {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    flex-wrap: wrap;
  }
  .header-logo {
    width: 2rem;
    height: 2rem;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .header-byline {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: #555570;
    font-weight: 400;
    align-self: flex-end;
    padding-bottom: 0.3rem;
    white-space: nowrap;
  }
  .made-by {
    margin-top: 1.5rem;
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: #3a3a55;
  }
  .lb-link-btn {
    display: block;
    text-align: center;
    margin: 0.8rem auto 0.4rem;
    padding: 0.5rem 1.2rem;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.06em;
    text-decoration: none;
    transition: border-color 0.2s, color 0.2s;
    width: fit-content;
  }
  .lb-link-btn:hover { border-color: var(--accent); color: var(--accent); }
  .version-tag {
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    color: #2a2a40;
    margin-top: 0.25rem;
  }
  .contact-section {
    margin-top: 2rem;
    padding: 1rem 1.2rem;
    border: 1px solid var(--border);
    border-radius: 12px;
    text-align: center;
    background: var(--surface);
  }
  .contact-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }
  .contact-name {
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.3rem;
  }
  .contact-email {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    text-decoration: none;
    letter-spacing: 0.02em;
    transition: opacity 0.2s;
  }
  .contact-email:hover { opacity: 0.7; }

  /* ── STARTUP ANIMATION ── */
  #splash {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    pointer-events: none;
    gap: 1rem;
  }
  #splash.done { }
  @keyframes splashFadeOut { }
  .splash-logo {
    width: 56px; height: 56px;
    border-radius: 14px;
    opacity: 0;
    transform: scale(0.5);
    animation: splashLogoIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s forwards;
  }
  @keyframes splashLogoIn {
    from { opacity: 0; transform: scale(0.4) rotate(-8deg); }
    to   { opacity: 1; transform: scale(1) rotate(0deg); }
  }
  .splash-title {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text);
    opacity: 0;
    animation: splashTitleIn 0.45s ease 0.4s forwards;
  }
  .splash-title span { color: var(--accent); }
  @keyframes splashTitleIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .splash-bar {
    width: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    animation: splashBarGrow 0.5s ease 0.65s forwards;
  }
  @keyframes splashBarGrow {
    from { width: 0; opacity: 0; }
    to   { width: 120px; opacity: 1; }
  }
  .splash-sub {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    opacity: 0;
    animation: splashSubIn 0.4s ease 0.9s forwards;
  }
  @keyframes splashSubIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* page content hidden until splash done */
  .container { opacity: 0; }

  .header-title-row .header-logo { display: none; }

  /* ── Board selector buttons ── */
  .board-btn-row {
    display: flex;
    gap: 0.6rem;
  }
  .board-btn-wrap {
    flex: 1;
    position: relative;
    border-radius: 10px;
  }
  /* Three spinning border layers — mirrors search-wrap */
  .bbn-dark, .bbn-border, .bbn-glow {
    position: absolute;
    inset: 0;
    border-radius: 10px;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .board-btn-wrap.active .bbn-dark,
  .board-btn-wrap.active .bbn-border,
  .board-btn-wrap.active .bbn-glow { opacity: 1; }
  .bbn-dark::before, .bbn-border::before, .bbn-glow::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 800px; height: 800px;
    background-repeat: no-repeat;
  }
  .bbn-dark   { inset: -1px; }
  .bbn-dark::before {
    transform: translate(-50%, -50%) rotate(82deg);
    background-image: conic-gradient(
      rgba(0,0,0,0),
      rgba(0,229,255,0.4),
      rgba(0,0,0,0) 10%,
      rgba(0,0,0,0) 50%,
      rgba(255,77,109,0.4),
      rgba(0,0,0,0) 60%
    );
    animation: boardGlowSpin 4s linear infinite;
  }
  .bbn-border { inset: -1px; filter: blur(0.5px); }
  .bbn-border::before {
    transform: translate(-50%, -50%) rotate(70deg);
    background-image: conic-gradient(
      var(--bg),
      var(--accent) 5%,
      var(--bg) 14%,
      var(--bg) 50%,
      var(--accent2) 60%,
      var(--bg) 64%
    );
    animation: boardGlowSpin 4s 0.1s linear infinite;
  }
  .bbn-glow   { inset: -3px; filter: blur(8px); opacity: 0; }
  .board-btn-wrap.active .bbn-glow { opacity: 0.5; }
  .bbn-glow::before {
    transform: translate(-50%, -50%) rotate(60deg);
    background-image: conic-gradient(
      #000,
      var(--accent) 5%,
      #000 38%,
      #000 50%,
      var(--accent2) 60%,
      #000 87%
    );
    animation: boardGlowSpin 4s 0.3s linear infinite;
  }
  /* inner mask */
  .board-btn-wrap::after {
    content: '';
    position: absolute;
    inset: 1.5px;
    border-radius: 8.5px;
    background: var(--surface);
    z-index: 1;
    pointer-events: none;
  }
  .board-btn {
    position: relative;
    z-index: 2;
    width: 100%;
    padding: 0.6rem 0;
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }
  .board-btn-wrap.active .board-btn {
    border-color: transparent;
  }
  .board-btn:hover { border-color: var(--accent); color: var(--text); }
  .board-btn.aqa:hover { border-color: var(--accent2); }
  .board-btn.active { color: var(--accent); background: rgba(0,229,255,0.06); }
  .board-btn.active.aqa { color: var(--accent2); background: rgba(255,77,109,0.06); }
  #code:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Manual override & dynamic loading ── */
  .manual-override-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-top: 0.3rem;
  }
  .btn-manual-toggle {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    padding: 0.2rem 0.55rem;
    border-radius: 5px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    letter-spacing: 0.03em;
  }
  .btn-manual-toggle:hover { border-color: var(--accent); color: var(--accent); }
  .btn-manual-toggle.active { border-color: var(--accent2); color: var(--accent2); }
  .manual-hint {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--accent2);
    opacity: 0.8;
  }
  .field-loading::after {
    content: '';
    display: block;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    background-size: 200% 100%;
    animation: loadingBar 1.2s linear infinite;
    border-radius: 2px;
    margin-top: 3px;
  }
  @keyframes loadingBar {
    0%   { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }




  /* ── WiFi loader (generate) ── */
  #wifi-loader {
    --background: #62abff;
    --front-color: var(--accent);
    --back-color: var(--border);
    --text-color: var(--muted);
    width: 64px; height: 64px;
    border-radius: 50px;

<style>

  :root {

  /* ── Theme toggle ── */
  .header-top-row {

    margin-bottom: 0.1rem;
  }
  /* ── Cosmic theme toggle ── */
  .cosmic-toggle {
    position: relative;
    width: 80px;
    height: 40px;
    transform-style: preserve-3d;
    perspective: 500px;
    margin-left: auto;
    flex-shrink: 0;

  .toggle { opacity: 0; width: 0; height: 0; }

    border-radius: 35px;
    transition: 0.5s;

  .inner-orb {
    position: absolute;
    inset: 4px;
    border-radius: 50%;

    transition: 0.5s;
    overflow: hidden;
  }
  .inner-orb::before {
    content: "";
    position: absolute;
    inset: 0;
    background: repeating-conic-gradient(from 0deg, transparent 0deg, rgba(0,0,0,0.1) 10deg, transparent 20deg);
    animation: patternRotate 10s linear infinite;
  }
  .ring {
    position: absolute;
    inset: -3px;
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 50%;
    transition: 0.5s;
  }
  .toggle:checked + .slider { background: linear-gradient(45deg, #16213e, #1a1a2e); }

    transform: translateX(40px) rotate(360deg);
    background: linear-gradient(145deg, #4ecdc4, #45b7af);
  }
  .toggle:checked + .slider .inner-orb {
    background: linear-gradient(145deg, #45b7af, #3da89f);
    transform: scale(0.9);
  }
  .toggle:checked + .slider .ring {
    border-color: rgba(78,205,196,0.3);
    animation: ringPulse 2s infinite;
  }
  .energy-line {
    position: absolute;
    width: 100%; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(78,205,196,0.5), transparent);
    transform-origin: left;
    opacity: 0;
    transition: 0.5s;
  }
  .energy-line:nth-child(1) { top: 20%; transform: rotate(15deg); }
  .energy-line:nth-child(2) { top: 50%; transform: rotate(0deg); }
  .energy-line:nth-child(3) { top: 80%; transform: rotate(-15deg); }
  .toggle:checked + .slider .energy-line { opacity: 1; animation: energyFlow 2s linear infinite; }
  .particles { position: absolute; width: 100%; height: 100%; }
  .particle {
    position: absolute;
    width: 4px; height: 4px;
    background: #4ecdc4;
    border-radius: 50%;
    opacity: 0;
  }
  .toggle:checked + .slider .particle { animation: particleBurst 1s ease-out infinite; }
  .particle:nth-child(1) { left: 20%; animation-delay: 0s; }
  .particle:nth-child(2) { left: 40%; animation-delay: 0.2s; }
  .particle:nth-child(3) { left: 60%; animation-delay: 0.4s; }
  .particle:nth-child(4) { left: 80%; animation-delay: 0.6s; }
  .particle:nth-child(5) { left: 30%; animation-delay: 0.8s; }
  .particle:nth-child(6) { left: 70%; animation-delay: 1s; }
  @keyframes ringPulse {

  @keyframes patternRotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  @keyframes energyFlow {
    0% { transform: scaleX(0) translateX(0); opacity: 0; }

  @keyframes particleBurst {

  .slider:hover .toggle-orb {

    color: #000;
  }
  .btn-generate:hover .btn-arrow {
    opacity: 1;
  }
  .btn-generate:active { scale: 0.97; }
  .btn-generate:disabled { opacity: 0.6; pointer-events: none; }

  .btn-row { display: flex; gap: 0.6rem; margin-top: 0.8rem; align-items: stretch; }
  .btn-row .btn-generate { flex: 1; margin-top: 0; }
  .btn-reset {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    padding: 0.9rem 1.2rem;
    background: transparent;
    color: var(--accent2);
    border: 2px solid var(--accent2);
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    transition: color 0.4s cubic-bezier(0.23, 1, 0.32, 1),
                background-color 0.4s cubic-bezier(0.23, 1, 0.32, 1);
  }
  .btn-reset:hover {
    background-color: var(--accent2);
    color: #000;
  }
  .btn-reset:active { scale: 0.97; }
  .btn-reset .reset-icon {
    display: inline-block;
    transform: scaleX(-1);
  }
  .btn-reset .reset-icon.spinning {
    animation: resetSpin 0.9s cubic-bezier(0.23, 1, 0.32, 1) forwards;
  }
  @keyframes resetSpin {
    from { transform: scaleX(-1) rotate(0deg); }
    to   { transform: scaleX(-1) rotate(-360deg); }
  }

  .result-box {
    margin-top: 1.2rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
    display: none;
  }
  .result-box.show { display: block; }
  .result-box.animating {
    animation: resultSlideIn 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  @keyframes resultSlideIn {
    from { opacity: 0; transform: translateY(10px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* border flash on entry */
  .result-box.animating {
    animation: resultSlideIn 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards,
               borderFlash 0.6s ease forwards;
  }
  @keyframes borderFlash {
    0%   { border-color: var(--success); box-shadow: 0 0 0 3px rgba(0,255,170,0.2); }
    100% { border-color: var(--border);  box-shadow: none; }
  }

  /* label pop */
  .result-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--success);
    margin-bottom: 0.5rem;
    opacity: 0;
  }
  .result-box.animating .result-label {
    animation: labelPop 0.3s ease 0.15s forwards;
  }
  @keyframes labelPop {
    from { opacity: 0; transform: scale(0.9); letter-spacing: 0.3em; }
    to   { opacity: 1; transform: scale(1);   letter-spacing: 0.15em; }
  }

  /* URL fade in */
  .result-url {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    word-break: break-all;
    line-height: 1.6;
    opacity: 0;
  }
  .result-box.animating .result-url {
    animation: fadeUp 0.3s ease 0.22s forwards;
  }

  /* buttons stagger */
  .result-actions { display: flex; gap: 0.6rem; margin-top: 1rem; flex-wrap: wrap; align-items: center; }
  .result-actions button { opacity: 0; }
  .result-box.animating .result-actions button:nth-child(1) { animation: fadeUp 0.25s ease 0.30s forwards; }
  .result-box.animating .result-actions button:nth-child(2) { animation: fadeUp 0.25s ease 0.38s forwards; }
  .result-box.animating .result-actions button:nth-child(3) { animation: fadeUp 0.25s ease 0.46s forwards; }
  .result-box.animating .result-actions button:nth-child(4) { animation: fadeUp 0.25s ease 0.54s forwards; }
  .result-box.animating .result-actions button:nth-child(5) { animation: fadeUp 0.25s ease 0.62s forwards; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .btn-open, .btn-copy {
    flex: 1;
    padding: 0.6rem;
    border-radius: 7px;
    border: none;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    cursor: pointer;
    transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.2s ease,
                background 0.2s ease,
                filter 0.2s ease;
  }
  .btn-open {
    background: var(--accent2);
    color: #fff;
  }
  .btn-open:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(255,77,109,0.4);
    filter: brightness(1.1);
  }
  .btn-open:active { transform: translateY(0); box-shadow: none; }

  .btn-copy {
    background: var(--border);
    color: var(--text);
  }
  .btn-copy:hover {
    background: var(--accent);
    color: #000;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,229,255,0.25);
  }
  .btn-copy:active { transform: translateY(0); box-shadow: none; }

  .error-msg {
    margin-top: 1rem;
    background: rgba(255,77,109,0.1);
    border: 1px solid var(--accent2);
    border-radius: 8px;
    padding: 0.8rem 1rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent2);
    display: none;
  }
  .error-msg.show { display: block; }
  .error-msg .bypass-row {
    margin-top: 0.6rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .btn-bypass {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.35rem 0.75rem;
    background: transparent;
    border: 1px solid var(--accent2);
    border-radius: 6px;
    color: var(--accent2);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.72rem;

  .bypass-warning {

  /* \u2500\u2500 CODES VIEW \u2500\u2500 */
  

  .top-bar {

    margin: 0 auto 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .back-btn {

    color: var(--accent);

  .page-title { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.02em; }
  .page-title span { color: var(--accent); }

  /* ── Search box poda glow ── */
  .search-wrap {
    max-width: 1100px;
    margin: 0 auto 1.5rem;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* spinning border layers */
  .search-glow,
  .search-border,
  .search-dark-border {
    position: absolute;
    inset: 0;
    border-radius: 10px;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }
  .search-dark-border::before,
  .search-glow::before,
  .search-border::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 800px; height: 800px;
    background-repeat: no-repeat;
  }
  .search-dark-border {
    inset: -1px;
    border-radius: 10px;
  }
  .search-dark-border::before {
    transform: translate(-50%, -50%) rotate(82deg);
    background-image: conic-gradient(
      rgba(0,0,0,0),
      rgba(0,229,255,0.4),
      rgba(0,0,0,0) 10%,
      rgba(0,0,0,0) 50%,
      rgba(255,77,109,0.4),
      rgba(0,0,0,0) 60%
    );
    animation: searchSpin 4s linear infinite;
  }
  .search-border {
    inset: -1px;
    filter: blur(0.5px);
  }
  .search-border::before {
    transform: translate(-50%, -50%) rotate(70deg);
    background-image: conic-gradient(
      var(--bg),
      var(--accent) 5%,
      var(--bg) 14%,
      var(--bg) 50%,
      var(--accent2) 60%,
      var(--bg) 64%
    );
    animation: searchSpin 4s 0.1s linear infinite;
  }
  .search-glow {
    inset: -3px;
    filter: blur(8px);
    opacity: 0.5;
  }
  .search-glow::before {
    transform: translate(-50%, -50%) rotate(60deg);
    background-image: conic-gradient(
      #000,
      var(--accent) 5%,
      #000 38%,
      #000 50%,
      var(--accent2) 60%,
      #000 87%
    );
    animation: searchSpin 4s 0.3s linear infinite;
  }
  /* inner mask to show only border */
  .search-wrap::after {
    content: '';
    position: absolute;
    inset: 2px;
    border-radius: 8px;
    background: var(--surface);
    z-index: 1;
    pointer-events: none;
  }
  @keyframes searchSpin {
    100% { transform: translate(-50%, -50%) rotate(450deg); }
  }
  @keyframes boardGlowSpin {
    100% { transform: translate(-50%, -50%) rotate(-450deg); }
  }
  .search-input {
    position: relative;
    z-index: 2;
    width: 100%;
    background: transparent;
    border: none;
    border-radius: 8px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    padding: 0.7rem 1rem;
    outline: none;
  }
  .search-input::placeholder { color: var(--muted); }

  .codes-grid {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
  }

  .codes-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    position: relative;
  }
  .codes-section::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .caie-sec::before { background: linear-gradient(90deg, var(--accent), #0070ff); }
  .aqa-sec::before  { background: linear-gradient(90deg, var(--accent2), #ff9900); }

  .sec-header { padding: 1rem 1.2rem; border-bottom: 1px solid var(--border); }
  .sec-title { font-size: 0.95rem; font-weight: 800; letter-spacing: 0.04em; }
  .caie-sec .sec-title { color: var(--accent); }
  .aqa-sec  .sec-title { color: var(--accent2); }
  .sec-sub { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--muted); margin-top: 0.2rem; }

  .cat-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0.6rem 1.2rem 0.3rem;
    border-top: 1px solid var(--border);
  }
  .cat-label:first-of-type { border-top: none; }

  .code-table { width: 100%; border-collapse: collapse; }
  .code-table tr { transition: background 0.12s; cursor: pointer; }
  .code-table tr:hover { background: rgba(255,255,255,0.04); }
  .code-table td { padding: 0.38rem 1.2rem; font-size: 0.8rem; line-height: 1.4; }

  .c-code {
    font-family: 'Space Mono', monospace;
    font-size: 0.76rem;
    width: 70px;
    white-space: nowrap;
  }
  .caie-sec .c-code { color: var(--accent); }
  .aqa-sec  .c-code { color: var(--accent2); }
  .c-name { color: var(--text); }

  .hidden-row { display: none; }

  /* Responsive */
  @media (max-width: 680px) {
    .codes-grid { grid-template-columns: 1fr; }
    h1 { font-size: 1.8rem; }
    .row-2 { grid-template-columns: 1fr; }
    .page-title { font-size: 1.2rem; }
  }

  /* ── Hide variant when GT selected ── */
  .variant-hidden { display: none !important; }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    15%       { transform: translateX(-6px); }
    30%       { transform: translateX(6px); }
    45%       { transform: translateX(-5px); }
    60%       { transform: translateX(5px); }
    75%       { transform: translateX(-3px); }

  /* ── Field error highlight ── */

  .did-you-mean {

  .code-suggestions {
    position: absolute;
    top: 100%;
    left: 0; right: 0;
    background: #1a1a24;
    border: 1px solid rgba(0,229,255,0.25);

  .code-suggestions::-webkit-scrollbar { width: 4px; }
  .code-suggestions::-webkit-scrollbar-track { background: transparent; }
  .code-suggestions::-webkit-scrollbar-thumb { background: rgba(0,229,255,0.2); border-radius: 2px; }
  .suggestion-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.55rem 0.75rem;

  .suggestion-item:hover, .suggestion-item.active {
    background: rgba(0,229,255,0.08);

  .suggestion-code {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    min-width: 3rem;
    font-weight: 700;
  }
  .suggestion-name {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.65);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .suggestion-highlight { color: #fff; }

  /* ── Recent searches ── */
  .recent-box { margin-bottom: 1.2rem; display: none; }
  .recent-box.visible { display: block; }
  .recent-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;

  .recent-list { display: flex; flex-direction: column; gap: 0.4rem; margin-top: 0.4rem; }

  /* ── Download btn ── */

  /* ── STARTUP ANIMATION ── */
  #splash {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    pointer-events: none;
    gap: 1rem;
  }
  #splash.done { }
  @keyframes splashFadeOut { }
  .splash-logo {
    width: 56px; height: 56px;
    border-radius: 14px;
    opacity: 0;
    transform: scale(0.5);
    animation: splashLogoIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s forwards;
  }
  @keyframes splashLogoIn {
    from { opacity: 0; transform: scale(0.4) rotate(-8deg); }
    to   { opacity: 1; transform: scale(1) rotate(0deg); }
  }
  .splash-title {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text);
    opacity: 0;
    animation: splashTitleIn 0.45s ease 0.4s forwards;
  }
  .splash-title span { color: var(--accent); }
  @keyframes splashTitleIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .splash-bar {
    width: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    animation: splashBarGrow 0.5s ease 0.65s forwards;
  }
  @keyframes splashBarGrow {
    from { width: 0; opacity: 0; }
    to   { width: 120px; opacity: 1; }
  }
  .splash-sub {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    opacity: 0;
    animation: splashSubIn 0.4s ease 0.9s forwards;
  }
  @keyframes splashSubIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* page content hidden until splash done */
  .container { opacity: 0; }

  .header-title-row .header-logo { display: none; }

  /* ── Board selector buttons ── */
  .board-btn-row {
    display: flex;
    gap: 0.6rem;
  }
  .board-btn-wrap {
    flex: 1;
    position: relative;
    border-radius: 10px;
  }
  /* Three spinning border layers — mirrors search-wrap */
  .bbn-dark, .bbn-border, .bbn-glow {
    position: absolute;
    inset: 0;
    border-radius: 10px;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .board-btn-wrap.active .bbn-dark,
  .board-btn-wrap.active .bbn-border,
  .board-btn-wrap.active .bbn-glow { opacity: 1; }
  .bbn-dark::before, .bbn-border::before, .bbn-glow::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 800px; height: 800px;
    background-repeat: no-repeat;
  }
  .bbn-dark   { inset: -1px; }
  .bbn-dark::before {
    transform: translate(-50%, -50%) rotate(82deg);
    background-image: conic-gradient(
      rgba(0,0,0,0),
      rgba(0,229,255,0.4),
      rgba(0,0,0,0) 10%,
      rgba(0,0,0,0) 50%,
      rgba(255,77,109,0.4),
      rgba(0,0,0,0) 60%
    );
    animation: boardGlowSpin 4s linear infinite;
  }
  .bbn-border { inset: -1px; filter: blur(0.5px); }
  .bbn-border::before {
    transform: translate(-50%, -50%) rotate(70deg);
    background-image: conic-gradient(
      var(--bg),
      var(--accent) 5%,
      var(--bg) 14%,
      var(--bg) 50%,
      var(--accent2) 60%,
      var(--bg) 64%
    );
    animation: boardGlowSpin 4s 0.1s linear infinite;
  }
  .bbn-glow   { inset: -3px; filter: blur(8px); opacity: 0; }
  .board-btn-wrap.active .bbn-glow { opacity: 0.5; }
  .bbn-glow::before {
    transform: translate(-50%, -50%) rotate(60deg);
    background-image: conic-gradient(
      #000,
      var(--accent) 5%,
      #000 38%,
      #000 50%,
      var(--accent2) 60%,
      #000 87%
    );
    animation: boardGlowSpin 4s 0.3s linear infinite;
  }
  /* inner mask */
  .board-btn-wrap::after {
    content: '';
    position: absolute;
    inset: 1.5px;
    border-radius: 8.5px;
    background: var(--surface);
    z-index: 1;
    pointer-events: none;
  }
  .board-btn {
    position: relative;
    z-index: 2;
    width: 100%;
    padding: 0.6rem 0;
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }
  .board-btn-wrap.active .board-btn {
    border-color: transparent;
  }
  .board-btn:hover { border-color: var(--accent); color: var(--text); }
  .board-btn.aqa:hover { border-color: var(--accent2); }
  .board-btn.active { color: var(--accent); background: rgba(0,229,255,0.06); }
  .board-btn.active.aqa { color: var(--accent2); background: rgba(255,77,109,0.06); }
  #code:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Manual override & dynamic loading ── */
  .manual-override-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-top: 0.3rem;
  }
  .btn-manual-toggle {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    padding: 0.2rem 0.55rem;
    border-radius: 5px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    letter-spacing: 0.03em;
  }
  .btn-manual-toggle:hover { border-color: var(--accent); color: var(--accent); }
  .btn-manual-toggle.active { border-color: var(--accent2); color: var(--accent2); }
  .manual-hint {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--accent2);
    opacity: 0.8;
  }
  .field-loading::after {
    content: '';
    display: block;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    background-size: 200% 100%;
    animation: loadingBar 1.2s linear infinite;
    border-radius: 2px;
    margin-top: 3px;
  }
  @keyframes loadingBar {
    0%   { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }




  /* ── WiFi loader (generate) ── */
  #wifi-loader {
    --background: #62abff;
    --front-color: var(--accent);
    --back-color: var(--border);
    --text-color: var(--muted);
    width: 64px; height: 64px;
    border-radius: 50px;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    display: none;
    margin: 0 auto;
  }
  #wifi-loader.active { display: flex; }
  #wifi-loader svg {
    position: absolute;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  #wifi-loader svg circle {
    position: absolute;
    fill: none;
    stroke-width: 6px;
    stroke-linecap: round;
    stroke-linejoin: round;
    transform: rotate(-100deg);
    transform-origin: center;
  }
  #wifi-loader svg circle.back { stroke: var(--back-color); }
  #wifi-loader svg circle.front { stroke: var(--front-color); }
  #wifi-loader svg.circle-outer { height: 86px; width: 86px; }
  #wifi-loader svg.circle-outer circle { stroke-dasharray: 62.75 188.25; }
  #wifi-loader svg.circle-outer circle.back  { animation: circle-outer135 1.8s ease infinite 0.3s; }
  #wifi-loader svg.circle-outer circle.front { animation: circle-outer135 1.8s ease infinite 0.15s; }
  #wifi-loader svg.circle-middle { height: 60px; width: 60px; }
  #wifi-loader svg.circle-middle circle { stroke-dasharray: 42.5 127.5; }
  #wifi-loader svg.circle-middle circle.back  { animation: circle-middle6123 1.8s ease infinite 0.25s; }
  #wifi-loader svg.circle-middle circle.front { animation: circle-middle6123 1.8s ease infinite 0.1s; }
  #wifi-loader svg.circle-inner { height: 34px; width: 34px; }
  #wifi-loader svg.circle-inner circle { stroke-dasharray: 22 66; }
  #wifi-loader svg.circle-inner circle.back  { animation: circle-inner162 1.8s ease infinite 0.2s; }
  #wifi-loader svg.circle-inner circle.front { animation: circle-inner162 1.8s ease infinite 0.05s; }
  #wifi-loader .text {
    position: absolute;
    bottom: -32px;
    display: flex; justify-content: center; align-items: center;
    font-weight: 500; font-size: 11px; letter-spacing: 0.2px;
    white-space: nowrap;
  }
  #wifi-loader .text::before, #wifi-loader .text::after { content: attr(data-text); }
  #wifi-loader .text::before { color: var(--text-color); }
  #wifi-loader .text::after {
    color: var(--front-color);
    animation: text-animation76 3.6s ease infinite;
    position: absolute; left: 0;
  }
  @keyframes circle-outer135 {
    0%   { stroke-dashoffset: 25; }
    25%  { stroke-dashoffset: 0; }
    65%  { stroke-dashoffset: 301; }
    80%  { stroke-dashoffset: 276; }
    100% { stroke-dashoffset: 276; }
  }
  @keyframes circle-middle6123 {
    0%   { stroke-dashoffset: 17; }
    25%  { stroke-dashoffset: 0; }
    65%  { stroke-dashoffset: 204; }
    80%  { stroke-dashoffset: 187; }
    100% { stroke-dashoffset: 187; }
  }
  @keyframes circle-inner162 {
    0%   { stroke-dashoffset: 9; }
    25%  { stroke-dashoffset: 0; }
    65%  { stroke-dashoffset: 106; }
    80%  { stroke-dashoffset: 97; }
    100% { stroke-dashoffset: 97; }
  }
  @keyframes text-animation76 {
    0%   { clip-path: inset(0 100% 0 0); }
    50%  { clip-path: inset(0); }
    100% { clip-path: inset(0 0 0 100%); }
  }

  /* ── Bounce loader (download) ── */
  .dl-loader {
    display: none;
    position: relative;
    width: 80px;
    height: 60px;
    margin: 0 auto;
  }
  .dl-loader.active { display: block; }
  .dl-loader:before {
    content: "";
    position: absolute;
    bottom: 20px; left: 33px;
    height: 20px; width: 20px;
    border-radius: 50%;
    background: var(--accent);
    animation: loading-bounce 0.5s ease-in-out infinite alternate;
  }
  .dl-loader:after {
    content: "";
    position: absolute;
    right: 0; top: 0;
    height: 5px; width: 30px;
    border-radius: 4px;
    box-shadow: 0 4px 0 var(--border), -23px 33px 0 var(--border), -46px 63px 0 var(--border);
    animation: loading-step 1s ease-in-out infinite;
  }
  @keyframes loading-bounce {
    0%   { transform: scale(1, 0.7); }
    40%  { transform: scale(0.8, 1.2); }
    60%  { transform: scale(1, 1); }
    100% { bottom: 90px; }
  }
  @keyframes loading-step {
    0%   { box-shadow: 0 8px 0 rgba(0,0,0,0), 0 8px 0 var(--border), -23px 33px 0 var(--border), -46px 60px 0 var(--border); }
    100% { box-shadow: 0 8px 0 var(--border), -23px 33px 0 var(--border), -46px 60px 0 var(--border), -46px 60px 0 rgba(0,0,0,0); }
  }

  /* ── Star rating ── */
  .rating-section {
    margin-top: 1.2rem;
    padding: 1rem 1.2rem;
    border: 1px solid var(--border);
    border-radius: 12px;
    text-align: center;
    background: var(--surface);
  }
  .rating-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.7rem;
  }
  .radio {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-direction: row-reverse;
  }
  .radio > input {
    position: absolute;
    appearance: none;
  }
  .radio > label {
    cursor: pointer;
    font-size: 30px;
    position: relative;
    display: inline-block;
    transition: transform 0.3s ease;
  }
  .radio > label > svg { fill: #666; transition: fill 0.3s ease; }
  /* Remove dots */
  .radio > label::before, .radio > label::after { display: none; }
  .radio > label:hover {
    transform: scale(1.2);
    animation: starPulse 0.6s infinite alternate;
  }
  .radio > label:hover > svg,
  .radio > label:hover ~ label > svg {
    fill: #ff9e0b;
    filter: drop-shadow(0 0 15px rgba(255,158,11,0.9));
    animation: shimmer 1s ease infinite alternate;
  }
  .radio > input:checked + label > svg,
  .radio > input:checked + label ~ label > svg {
    fill: #ff9e0b;
    filter: drop-shadow(0 0 15px rgba(255,158,11,0.9));
    animation: starPulse 0.8s infinite alternate;
  }
  .radio > input:checked + label:hover > svg,
  .radio > input:checked + label:hover ~ label > svg { fill: #e58e09; }
  .radio > label:hover > svg, .radio > label:hover ~ label > svg { fill: #ff9e0b; }
  .radio input:checked ~ label svg { fill: #ffa723; }
  @keyframes starPulse { 0%{transform:scale(1)} 100%{transform:scale(1.1)} }
  @keyframes shimmer {
    0%  { filter: drop-shadow(0 0 10px rgba(255,158,11,0.5)); }
    100%{ filter: drop-shadow(0 0 20px rgba(255,158,11,1)); }
  }
  .rating-submit-btn {
    margin-top: 0.8rem;
    padding: 0.55rem 1.4rem;
    background: transparent;
    border: 1.5px solid var(--accent);
    border-radius: 8px;
    color: var(--accent);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.82rem;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .rating-submit-btn:hover:not(:disabled) {
    background: var(--accent);
    color: #000;
  }
  .rating-submit-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    border-color: var(--muted);
    color: var(--muted);
  }
  .rating-thanks {
    display: none;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    margin-top: 0.6rem;
    letter-spacing: 0.05em;
  }
  .rating-thanks.show { display: block; }


  * { box-sizing: border-box; }
  body { margin: 0; overflow: hidden; height: 100vh; }

  /* Layout */
  .viewer-layout {
    display: flex;
    height: 100vh;
    width: 100vw;
  }

  /* PDF panel */
  .pdf-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: var(--bg);
  }
  .pdf-topbar {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.6rem 1rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .pdf-title {
    flex: 1;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .pdf-nav {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .pdf-nav button {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #000;
    font-size: 1.2rem;
    font-weight: 700;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    flex-shrink: 0;
  }
  .pdf-nav button:hover { opacity: 0.85; transform: scale(1.08); }
  .pdf-nav button:active { transform: scale(0.95); }
  .pdf-nav button:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
  .pdf-nav span {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    min-width: 4rem;
    text-align: center;
  }
  .pdf-canvas-wrap {
    flex: 1;
    overflow-y: auto;
    overflow-x: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1rem;
    gap: 1rem;
  }
  .pdf-canvas-wrap canvas {
    border-radius: 4px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .pdf-page-wrap { box-shadow: 0 4px 20px rgba(0,0,0,0.4); border-radius: 4px; overflow: hidden; }
  .pdf-text-layer { opacity: 0 !important; }
  .pdf-text-layer > span {
    color: transparent;
    position: absolute;
    white-space: pre;
    cursor: text;
    transform-origin: 0% 0%;
    user-select: text;
    -webkit-user-select: text;
  }
  .pdf-text-layer ::selection { background: rgba(0,229,255,0.3); }
  .pdf-text-layer ::-moz-selection { background: rgba(0,229,255,0.3); }
  /* File selector bar */
  .file-selector-bar {
    display: none;
    flex-wrap: wrap;
    gap: 0.4rem;
    padding: 0.5rem 1rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    align-items: center;
    overflow-x: auto;
  }
  .file-selector-bar.show { display: flex; }
  .file-chip {
    padding: 0.3rem 0.7rem;
    border-radius: 20px;
    border: 1px solid var(--border);
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    background: transparent;
    color: var(--muted);
  }
  .file-chip:hover { border-color: var(--accent); color: var(--accent); }
  .file-chip.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
  .file-chip.audio { border-color: var(--accent2); color: var(--accent2); }
  .file-chip.audio.active { background: var(--accent2); color: #fff; }

  /* Audio player */
  .audio-panel {
    display: none;
    flex-direction: column;
    gap: 0.5rem;
    padding: 1rem;
    align-items: center;
    justify-content: center;
    flex: 1;
  }
  .audio-panel.show { display: flex; }
  .audio-title { font-family: 'Space Mono', monospace; font-size: 0.75rem; color: var(--muted); margin-bottom: 0.5rem; }
  .audio-controls { display: flex; align-items: center; gap: 0.8rem; }
  .audio-ctrl-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 42px; height: 42px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 1.1rem;
    transition: all 0.15s; color: var(--text);
  }
  .audio-ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
  .audio-play-btn {
    background: var(--accent); border: none; color: #000;
    width: 52px; height: 52px; font-size: 1.3rem; border-radius: 50%;
  }
  .audio-play-btn:hover { opacity: 0.85; }
  .audio-speed {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-family: 'Space Mono', monospace;
    font-size: 0.7rem; padding: 0.3rem 0.4rem; cursor: pointer; outline: none;
  }
  .audio-progress-wrap {
    width: 100%; max-width: 360px;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .audio-progress {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 4px; background: var(--border); border-radius: 2px; outline: none; cursor: pointer;
  }
  .audio-progress::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    border-radius: 50%; background: var(--accent); cursor: pointer;
  }
  .audio-time { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted); min-width: 7rem; text-align: center; }

  .pdf-loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    gap: 0.6rem;
  }

  /* Chat panel */
  .chat-panel {
    width: 340px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-left: 1px solid var(--border);
    background: var(--surface);
  }
  .chat-topbar {
    padding: 0.8rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-shrink: 0;
  }
  .chat-topbar-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 0.9rem;
    flex: 1;
  }
  .chat-topbar-title span { color: var(--accent); }
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
  }
  .chat-msg {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    line-height: 1.6;
    padding: 0.6rem 0.8rem;
    border-radius: 8px;
    max-width: 92%;
  }
  .chat-msg.user {
    background: rgba(0,229,255,0.1);
    border: 1px solid rgba(0,229,255,0.2);
    align-self: flex-end;
    color: var(--text);
  }
  .chat-msg.ai {
    background: var(--bg);
    border: 1px solid var(--border);
    align-self: flex-start;
    color: var(--text);

  .chat-msg.ai.streaming::after {
    content: '▋';
    animation: blink 0.7s step-end infinite;
    color: var(--accent);
  }
  @keyframes blink { 50% { opacity: 0; } }
  .chat-hint {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    padding: 0 1rem 0.5rem;
    line-height: 1.5;
    flex-shrink: 0;
  }
  .chat-hint span { color: var(--accent); cursor: pointer; }
  .chat-hint span:hover { text-decoration: underline; }
  .chat-input-row {
    display: flex;
    gap: 0.5rem;
    padding: 0.8rem;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  /* Chat input — same 3-layer glow as board buttons */

    flex: 1;
    position: relative;
    border-radius: 8px;
  }
  .cin-dark, .cin-border, .cin-glow {

  }

      rgba(0,229,255,0.4),
      rgba(0,0,0,0) 10%,
      rgba(0,0,0,0) 50%,
      rgba(255,77,109,0.4),
      rgba(0,0,0,0) 60%
    );
    animation: chatGlowSpin 4s linear infinite;
  }
  .cin-border { inset: -1px; filter: blur(0.5px); }
  .cin-border::before {
    transform: translate(-50%, -50%) rotate(70deg);
    background-image: conic-gradient(
      var(--bg),
      var(--accent) 5%,
      var(--bg) 14%,
      var(--bg) 50%,
      var(--accent2) 60%,
      var(--bg) 64%
    );

  }
  .cin-glow { inset: -3px; filter: blur(8px); opacity: 0.4; }
  .cin-glow::before {
    transform: translate(-50%, -50%) rotate(60deg);
    background-image: conic-gradient(
      #000,
      var(--accent) 5%,
      #000 38%,
      #000 50%,
      var(--accent2) 60%,
      #000 87%
    );
    animation: chatGlowSpin 4s 0.3s linear infinite;
  }
  /* inner mask */
  .chat-input-wrap::after {
    content: '';
    position: absolute;
    inset: 1.5px;
    border-radius: 7px;
    background: var(--bg);
    z-index: 1;
    pointer-events: none;
  }
  @keyframes chatGlowSpin {
    100% { transform: translate(-50%, -50%) rotate(360deg); }
  }
  .chat-input {
    position: relative;
    z-index: 2;
    width: 100%;
    background: transparent;
    border: none;
    border-radius: 8px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    padding: 0.5rem 0.7rem;
    outline: none;
    resize: none;
    height: 60px;
    display: block;
  }
  .chat-send {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #000;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    padding: 0 0.8rem;
    cursor: pointer;
    transition: opacity 0.2s;
    flex-shrink: 0;
  }
  .chat-send:hover:not(:disabled) { opacity: 0.85; }
  .chat-send:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Resize handle */
  .resize-handle {
    width: 4px;
    cursor: col-resize;
    background: var(--border);
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .resize-handle:hover { background: var(--accent); }

  @media (max-width: 700px) {
    .viewer-layout { flex-direction: column; }
    .chat-panel { width: 100%; height: 40vh; border-left: none; border-top: 1px solid var(--border); }
    .resize-handle { display: none; }
  }
</style>

<div class="viewer-layout">
  <!-- PDF panel -->
  <div class="pdf-panel" id="pdfPanel">
    <div class="pdf-topbar">
      <button class="back-btn" style="flex-shrink:0" onclick="goBack()">&#8592; Back</button>
      <span class="pdf-title" id="pdfTitle">Loading…</span>
      <div class="pdf-nav">
        <button onclick="prevPage()">&#8249;</button>
        <span id="pageInfo">— / —</span>
        <button onclick="nextPage()">&#8250;</button>
      </div>
    </div>
    <div class="file-selector-bar" id="fileSelectorBar"></div>

    <!-- Audio player (shown instead of PDF for .mp3 files) -->
    <div class="audio-panel" id="audioPanel">
      <div class="audio-title" id="audioTitle">Loading audio…</div>
      <div class="audio-progress-wrap">
        <span class="audio-time" id="audioTime">0:00 / 0:00</span>
        <input type="range" class="audio-progress" id="audioProgress" value="0" min="0" step="0.1">
      </div>
      <div class="audio-controls">
        <button class="audio-ctrl-btn" onclick="audioSeek(-10)" title="-10s">&#8592;10</button>
        <button class="audio-ctrl-btn audio-play-btn" id="audioPlayBtn" onclick="toggleAudio()">&#9654;</button>
        <button class="audio-ctrl-btn" onclick="audioSeek(10)" title="+10s">10&#8594;</button>
        <select class="audio-speed" id="audioSpeed" onchange="setAudioSpeed(this.value)">
          <option value="0.75">0.75x</option>
          <option value="1" selected>1x</option>
          <option value="1.25">1.25x</option>
          <option value="1.5">1.5x</option>
          <option value="2">2x</option>
        </select>
      </div>
      <audio id="audioEl" onended="onAudioEnded()" ontimeupdate="updateAudioProgress()" onloadedmetadata="updateAudioProgress()"></audio>
    </div>

    <div class="pdf-canvas-wrap" id="pdfWrap">
      <div class="pdf-loading" id="pdfLoading" style="display:flex">
        <span class="btn-spinner" style="width:18px;height:18px;border-width:2px"></span>
        Loading PDF…
      </div>
    </div>
  </div>

  <!-- Resize handle -->
  <div class="resize-handle" id="resizeHandle"></div>

  <!-- Chat panel -->
  <div class="chat-panel" id="chatPanel">
    <div class="chat-topbar">
      <div class="chat-topbar-title">Paper<span>AI</span></div>
      <button class="back-btn" style="font-size:0.7rem;padding:0.3rem 0.6rem" onclick="clearChat()">Clear</button>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="chat-msg ai">Hi! I&#8217;m PastPaperAI.<br><br>Ask me anything about this exam &#8212; I can explain questions, summarise topics &amp; answer questions.<br><br><span style="font-size:0.62rem;color:var(--muted)">PastPaperAI is prone to making mistakes. Results are for reference only.</span></div>
    </div>
    <div class="chat-hint" id="chatHint"></div>
    <div class="chat-input-row">
      <div class="chat-input-wrap">
        <div class="cin-dark"></div>
        <div class="cin-border"></div>
        <div class="cin-glow"></div>
        <textarea class="chat-input" id="chatInput" placeholder="Ask about this paper…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
      </div>
      <button class="chat-send" id="chatSend" onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<script>
  // ── Init ──
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  try { if (localStorage.getItem('pp_theme') === 'light') document.body.classList.add('light'); } catch {}

  const params = new URLSearchParams(window.location.search);
  const pdfUrl = params.get('url');

  if (!pdfUrl) {
    document.getElementById('pdfLoading').textContent = 'No PDF URL provided.';
  } else {
    document.getElementById('pdfTitle').textContent = decodeURIComponent(pdfUrl).split('/').pop();
    // Build related files from URL pattern
    const relatedFiles = buildRelatedFiles(pdfUrl);
    buildFileSelector(relatedFiles);
    loadFile(pdfUrl);
  }

  function buildRelatedFiles(url) {
    const files = [];
    // CAIE: .../upload/CODE_SESS_TYPE_VARIANT.pdf
    const caie = url.match(/upload\/([^/]+)\.pdf$/);
    if (!caie) { files.push({label: url.split('/').pop(), url, type:'pdf'}); return files; }
    const base = caie[1]; // e.g. 0580_s24_qp_11
    const m = base.match(/^(\d{4}_[smw]\d{2})_([a-z]+)_(\d+)$/) || base.match(/^(\d{4}_[smw]\d{2})_([a-z]+)$/);
    if (!m) { files.push({label: base, url, type:'pdf'}); return files; }
    const prefix = m[1]; // e.g. 0580_s24
    const type = m[2];
    const variant = m[3] || null;
    const baseUrl = url.substring(0, url.lastIndexOf('/') + 1);
    const types = ['qp','ms','er','in','ci','gt','gb','rp','sf'];
    for (const t of types) {
      const u = variant
        ? baseUrl + prefix + '_' + t + '_' + variant + '.pdf'
        : baseUrl + prefix + '_' + t + '.pdf';
      const isAudio = t === 'sf';
      const audioUrl = variant
        ? baseUrl + prefix + '_sf_' + variant + '.mp3'
        : baseUrl + prefix + '_sf.mp3';
      const label = t.toUpperCase() + (variant ? ' v' + parseInt(variant) : '');
      files.push({ label, url: isAudio ? audioUrl : u, type: isAudio ? 'audio' : 'pdf' });
    }
    return files;
  }

  // ── PDF ──
  let pdfDoc = null, currentPage = 1, pdfText = [];

  // ── File management ──
  let _allFiles = [];   // [{label, url, type:'pdf'|'audio'}]
  let _currentFileUrl = pdfUrl;

  async function loadFile(url) {
    _currentFileUrl = url;
    const isAudio = url && (
      url.endsWith('.mp3') || url.endsWith('.wav') || url.endsWith('.ogg') ||
      url.includes('_sf_') || url.includes('_sf.')
    );
    document.getElementById('audioPanel').classList.toggle('show', isAudio);
    document.getElementById('pdfWrap').style.display = isAudio ? 'none' : '';
    document.querySelectorAll('.pdf-nav button').forEach(b => b.style.visibility = isAudio ? 'hidden' : '');

    if (isAudio) {
      const audio = document.getElementById('audioEl');
      const proxyUrl = '/api/download-pdf?url=' + encodeURIComponent(url);
      audio.src = proxyUrl;
      document.getElementById('audioTitle').textContent = url.split('/').pop();
      audio.load();
    } else {
      document.getElementById('pdfWrap').innerHTML = '';
      const loader = document.getElementById('pdfLoading');
      if (loader) { loader.style.display = 'flex'; loader.textContent = 'Loading PDF…'; }
      loadPdf(url);
    }
    // Update chip active state
    document.querySelectorAll('.file-chip').forEach(c => {
      c.classList.toggle('active', c.dataset.url === url);
    });
  }

  async function loadPdf(url) {
    document.getElementById('pdfLoading').style.display = 'flex';
    try {
      const proxyUrl = '/api/download-pdf?url=' + encodeURIComponent(url);
      const resp = await fetch(proxyUrl);
      if (!resp.ok) throw new Error('fetch failed');
      const arrayBuffer = await resp.arrayBuffer();
      pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      document.getElementById('pdfLoading').style.display = 'none';
      extractAllText();
      renderPage(1);
    } catch (e) {
      document.getElementById('pdfLoading').textContent = 'Could not load PDF. ' + e.message;
    }
  }

  function buildFileSelector(files) {
    _allFiles = files;
    const bar = document.getElementById('fileSelectorBar');
    if (!files || files.length <= 1) { bar.classList.remove('show'); return; }
    bar.classList.add('show');
    bar.innerHTML = files.map(f => {
      const isAudio = f.type === 'audio';
      return '<button class="file-chip' + (isAudio?' audio':'') + (f.url === pdfUrl ? ' active' : '') + '" data-url="' + f.url + '" onclick="loadFile(this.dataset.url)">' + f.label + '</button>';
    }).join('');
  }

  // ── Audio controls ──
  function toggleAudio() {
    const audio = document.getElementById('audioEl');
    const btn = document.getElementById('audioPlayBtn');
    if (audio.paused) { audio.play(); btn.innerHTML = '&#9646;&#9646;'; }
    else { audio.pause(); btn.innerHTML = '&#9654;'; }
  }
  function audioSeek(secs) {
    const audio = document.getElementById('audioEl');
    audio.currentTime = Math.max(0, Math.min(audio.duration || 0, audio.currentTime + secs));
  }
  function setAudioSpeed(v) { document.getElementById('audioEl').playbackRate = parseFloat(v); }
  function onAudioEnded() { document.getElementById('audioPlayBtn').innerHTML = '&#9654;'; }
  function updateAudioProgress() {
    const audio = document.getElementById('audioEl');
    const prog = document.getElementById('audioProgress');
    const time = document.getElementById('audioTime');
    if (!isNaN(audio.duration)) {
      prog.max = audio.duration;
      prog.value = audio.currentTime;
      time.textContent = fmt(audio.currentTime) + ' / ' + fmt(audio.duration);
    }
  }
  document.getElementById('audioProgress').addEventListener('input', function() {
    document.getElementById('audioEl').currentTime = this.value;
  });
  function fmt(s) {
    const m = Math.floor(s/60), sec = Math.floor(s%60);
    return m + ':' + (sec<10?'0':'') + sec;
  }

  let _currentScale = null;

  async function renderPage(n) {
    currentPage = Math.max(1, Math.min(n, pdfDoc.numPages));
    document.getElementById('pageInfo').textContent = currentPage + ' / ' + pdfDoc.numPages;
    const wrap = document.getElementById('pdfWrap');
    wrap.querySelectorAll('.pdf-page-wrap').forEach(c => c.remove());
    const page = await pdfDoc.getPage(currentPage);
    const baseVp = page.getViewport({ scale: 1 });
    const scale = Math.min(2.5, (wrap.clientWidth - 32) / baseVp.width) || 1.5;
    _currentScale = scale;
    const vp = page.getViewport({ scale });

    // Page wrapper for canvas + text layer
    const pageWrap = document.createElement('div');
    pageWrap.className = 'pdf-page-wrap';
    pageWrap.style.cssText = 'position:relative;width:' + vp.width + 'px;height:' + vp.height + 'px;flex-shrink:0';

    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    canvas.width = vp.width * dpr;
    canvas.height = vp.height * dpr;
    canvas.style.width = vp.width + 'px';
    canvas.style.height = vp.height + 'px';
    canvas.style.display = 'block';
    ctx.scale(dpr, dpr);
    pageWrap.appendChild(canvas);

    // Text layer for selectable text
    const textLayerDiv = document.createElement('div');
    textLayerDiv.className = 'pdf-text-layer';
    textLayerDiv.style.cssText = 'position:absolute;top:0;left:0;width:' + vp.width + 'px;height:' + vp.height + 'px;overflow:hidden;opacity:0.2;line-height:1';
    pageWrap.appendChild(textLayerDiv);
    wrap.appendChild(pageWrap);

    await page.render({ canvasContext: ctx, viewport: vp }).promise;

    // Render text layer
    const textContent = await page.getTextContent();
    pdfjsLib.renderTextLayer({
      textContent,
      container: textLayerDiv,
      viewport: vp,
      textDivs: []
    });

    wrap.scrollTop = 0;
  }

  function prevPage() { if (pdfDoc && currentPage > 1) renderPage(currentPage - 1); }
  function nextPage() { if (pdfDoc && currentPage < pdfDoc.numPages) renderPage(currentPage + 1); }

  async function extractAllText() {
    if (!pdfDoc) return;
    pdfText = [];
    for (let i = 1; i <= Math.min(pdfDoc.numPages, 20); i++) {
      const page = await pdfDoc.getPage(i);
      const tc = await page.getTextContent();
      pdfText.push(tc.items.map(s => s.str).join(' '));
    }
    // Update hint
    const hint = document.getElementById('chatHint');
    hint.innerHTML = "Suggested: <span onclick=\"ask('Summarise this paper')\">Summarise</span> &middot; <span onclick=\"ask('What topics does this cover?')\">Topics</span> &middot; <span onclick=\"ask('Explain question 1')\">Explain Q1</span>";
  }

  function ask(q) {
    document.getElementById('chatInput').value = q;
    sendMessage();
  }

  // ── Chat ──
  const history = [];

  async function sendMessage() {
    const input = document.getElementById('chatInput');
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    addMsg('user', msg);
    history.push({ role: 'user', content: msg });

    const sendBtn = document.getElementById('chatSend');
    sendBtn.disabled = true;

    const aiDiv = addMsg('ai', '');
    aiDiv.classList.add('streaming');

    try {
      const fileList = _allFiles.length > 1
        ? "Available files for this paper: " + _allFiles.map(f=>f.label + ' (' + f.type + ')').join(', ') + "\n\n"
        : "";
      const context = fileList + (pdfText.length
        ? "Extracted text from current file (may be partial):\n\n" + pdfText.join("\n\n---\n\n").slice(0, 8000)
        : "No text extracted from current file.");

      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: history,
          context,
          url: pdfUrl
        })
      });

      if (!resp.ok) {
        if (resp.status === 429) throw new Error('Rate limit reached — wait a moment and try again.');
        if (resp.status === 401) throw new Error('Invalid API key. Check GROQ_API_KEY in Vercel.');
        throw new Error('API error ' + resp.status);
      }

      // Stream response
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let full = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value);
        // Parse SSE lines
        for (const line of chunk.split("\n")) {
          if (line.startsWith('data: ')) {
            const data = line.slice(6);
            if (data === '[DONE]') break;
            try {
              const j = JSON.parse(data);
              const delta = j.delta?.text || j.choices?.[0]?.delta?.content || '';
              full += delta;
              aiDiv.innerHTML = renderMarkdown(full);
              scrollChat();
            } catch {}
          }
        }
      }
      aiDiv.classList.remove('streaming');
      if (!full) aiDiv.innerHTML = 'Sorry, I could not get a response.';
      history.push({ role: 'assistant', content: full });
    } catch (e) {
      aiDiv.classList.remove('streaming');
      aiDiv.textContent = 'Error: ' + e.message;
    }

    sendBtn.disabled = false;
    input.focus();
  }

  function renderMarkdown(text) {
    // Simple markdown: bold, bullets, emojis pass through, line breaks
    return text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,'<em>$1</em>')
      .replace(/`(.+?)`/g,'<code style="background:rgba(0,229,255,0.1);padding:0.1em 0.3em;border-radius:3px;font-size:0.9em">$1</code>')
      .replace(/^#{1,3}\s+(.+)$/gm,'<div style="font-weight:700;font-size:0.85rem;color:var(--accent);margin:0.4em 0">$1</div>')
      .replace(/^[\-\*]\s+(.+)$/gm,'<div style="padding-left:0.8em">&#8226; $1</div>')
      .replace(/^(\d+)\.\s+(.+)$/gm,'<div style="padding-left:0.8em">$1. $2</div>')
      .replace(/\n/g,'<br>');
  }

  function addMsg(role, text) {
    const div = document.createElement('div');
    div.className = 'chat-msg ' + role;
    if (role === 'ai' && text) {
      div.innerHTML = renderMarkdown(text);
    } else {
      div.textContent = text;
    }
    document.getElementById('chatMessages').appendChild(div);
    scrollChat();
    return div;
  }

  function scrollChat() {
    const msgs = document.getElementById('chatMessages');
    msgs.scrollTop = msgs.scrollHeight;
  }

  function clearChat() {
    const msgs = document.getElementById('chatMessages');
    msgs.innerHTML = '<div class="chat-msg ai">Chat cleared. Ask me anything about this paper.</div>';
    history.length = 0;
  }

  // ── Resize handle ──
  const handle = document.getElementById('resizeHandle');
  let resizing = false;
  handle.addEventListener('mousedown', e => { resizing = true; document.body.style.userSelect = 'none'; });
  document.addEventListener('mousemove', e => {
    if (!resizing) return;
    const layout = document.querySelector('.viewer-layout');
    const rect = layout.getBoundingClientRect();
    const chatWidth = Math.max(260, Math.min(600, rect.right - e.clientX));
    document.getElementById('chatPanel').style.width = chatWidth + 'px';
  });
  document.addEventListener('mouseup', () => { resizing = false; document.body.style.userSelect = ''; });

  function goBack() {
    sessionStorage.setItem('fromCodes', '1');
    window.location.href = '/';
  }
</script>
</body>
</html>
