  // ── Markup system ──
  let _muTool  = 'draw';     // draw | highlight | line | eraser | text
  let _muColor = '#00e5ff';
  let _muSize  = 3;
  let _muHistory = {};       // { pageNum: [ImageData, ...] }
  let _muDrawing  = false;
  let _muStartX = 0, _muStartY = 0;
  let _muLineSnap = null;    // temp canvas for line preview
  let _markupActive = false;

  function toggleMarkup() {
    _markupActive = !_markupActive;
    // Toggle pointer events on markup canvases
    document.querySelectorAll('.markup-canvas').forEach(c => {
      c.style.pointerEvents = _markupActive ? 'auto' : 'none';
    });
  }

  function setTool(tool) {
    _muTool = tool;
    ['muDraw','muHighlight','muLine','muText','muEraser'].forEach(id => {
      const b = document.getElementById(id);
      if (b) b.classList.remove('active');
    });
    const map = { draw:'muDraw', highlight:'muHighlight', line:'muLine', text:'muText', eraser:'muEraser' };
    const btn = document.getElementById(map[tool]);
    if (btn) btn.classList.add('active');
    document.querySelectorAll('.markup-canvas').forEach(c => {
      c.style.cursor = tool === 'text' ? 'text' : tool === 'eraser' ? 'cell' : 'crosshair';
    });
  }

  function updateMarkupColor(hex) {
    _muColor = hex;
    document.getElementById('muSwatch').style.background = hex;
  }

  function getMarkupCtx(canvas) {
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const scale = canvas.width / parseFloat(canvas.style.width);
    return { ctx, scale, dpr };
  }

  function initMarkupCanvas(canvas) {
    const pageN = parseInt(canvas.dataset.page);

    canvas.addEventListener('pointerdown', e => {
      if (!_markupActive) return;
      e.preventDefault();
      canvas.setPointerCapture(e.pointerId);
      _muDrawing = true;
      const { ctx, scale } = getMarkupCtx(canvas);
      const rect = canvas.getBoundingClientRect();
      _muStartX = (e.clientX - rect.left) * scale;
      _muStartY = (e.clientY - rect.top)  * scale;

      // Save state for undo
      if (!_muHistory[pageN]) _muHistory[pageN] = [];
      _muHistory[pageN].push(ctx.getImageData(0, 0, canvas.width, canvas.height));

      if (_muTool === 'text') {
        _muDrawing = false;
        const inp = document.createElement('input');
        inp.type = 'text';
        inp.style.cssText = `position:absolute;left:${e.clientX - canvas.getBoundingClientRect().left}px;top:${e.clientY - canvas.getBoundingClientRect().top}px;z-index:20;background:transparent;border:1px dashed ${_muColor};color:${_muColor};font-size:${_muSize * 4}px;font-family:Space Mono,monospace;outline:none;min-width:80px`;
        canvas.parentElement.appendChild(inp);
        inp.focus();
        inp.addEventListener('blur', () => {
          if (inp.value) {
            ctx.font = `${_muSize * 4 * scale}px "Space Mono", monospace`;
            ctx.fillStyle = _muColor;
            ctx.fillText(inp.value, _muStartX, _muStartY + (_muSize * 4 * scale));
          }
          inp.remove();
          saveMarkup(canvas, pageN);
        });
        inp.addEventListener('keydown', e => { if (e.key === 'Enter') inp.blur(); });
        return;
      }

      if (_muTool === 'draw' || _muTool === 'highlight' || _muTool === 'eraser') {
        ctx.beginPath();
        ctx.moveTo(_muStartX, _muStartY);
      }
    });

    canvas.addEventListener('pointermove', e => {
      if (!_muDrawing) return;
      e.preventDefault();
      const { ctx, scale } = getMarkupCtx(canvas);
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX - rect.left) * scale;
      const y = (e.clientY - rect.top)  * scale;
      const sz = _muSize || 3;

      if (_muTool === 'draw') {
        ctx.globalCompositeOperation = 'source-over';
        ctx.strokeStyle = _muColor;
        ctx.lineWidth   = sz * scale;
        ctx.lineCap     = 'round';
        ctx.lineJoin    = 'round';
        ctx.globalAlpha = 1;
        ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
      } else if (_muTool === 'highlight') {
        ctx.globalCompositeOperation = 'source-over';
        ctx.strokeStyle = _muColor || '#ffff00';
        ctx.lineWidth   = sz * scale * 6;
        ctx.lineCap     = 'square';
        ctx.globalAlpha = 0.22;
        ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
      } else if (_muTool === 'eraser') {
        ctx.globalCompositeOperation = 'destination-out';
        ctx.lineWidth = sz * scale * 5;
        ctx.lineCap   = 'round';
        ctx.globalAlpha = 1;
        ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
      } else if (_muTool === 'line') {
        // Restore last saved state and draw preview line
        if (_muHistory[pageN] && _muHistory[pageN].length) {
          ctx.putImageData(_muHistory[pageN][_muHistory[pageN].length - 1], 0, 0);
        }
        ctx.globalCompositeOperation = 'source-over';
        ctx.strokeStyle = _muColor; ctx.lineWidth = sz * scale; ctx.lineCap = 'round'; ctx.globalAlpha = 1;
        ctx.beginPath(); ctx.moveTo(_muStartX, _muStartY); ctx.lineTo(x, y); ctx.stroke();
      }
    });

    canvas.addEventListener('pointerup', e => {
      if (!_muDrawing) return;
      _muDrawing = false;
      const { ctx } = getMarkupCtx(canvas);
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = 1;
      saveMarkup(canvas, pageN);
    });
  }

  // Save/restore markup per page to localStorage
  function saveMarkup(canvas, pageN) {
    try { localStorage.setItem('mu_' + (pdfUrl||'x') + '_p' + pageN, canvas.toDataURL()); } catch {}
  }

  function restoreMarkup(canvas, pageN) {
    try {
      const data = localStorage.getItem('mu_' + (pdfUrl||'x') + '_p' + pageN);
      if (!data) return;
      const img = new Image();
      img.onload = () => { const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0); };
      img.src = data;
    } catch {}
  }

  function undoMarkup() {
    // Undo on the currently visible page
    const visible = document.querySelector('.markup-canvas');
    if (!visible) return;
    const pageN = parseInt(visible.dataset.page);
    const hist  = _muHistory[pageN];
    if (!hist || !hist.length) return;
    const ctx = visible.getContext('2d');
    ctx.putImageData(hist.pop(), 0, 0);
    saveMarkup(visible, pageN);
  }

  function clearMarkup() {
    if (!confirm('Clear all markup on all pages?')) return;
    document.querySelectorAll('.markup-canvas').forEach(c => {
      const ctx = c.getContext('2d');
      ctx.clearRect(0, 0, c.width, c.height);
      const pageN = parseInt(c.dataset.page);
      saveMarkup(c, pageN);
      if (_muHistory[pageN]) _muHistory[pageN] = [];
    });
  }

  function saveMarkupImage() {
    // For current page: merge PDF canvas + markup canvas and download
    const pdfCanvases = document.querySelectorAll('.pdf-page-container canvas:not(.markup-canvas)');
    const muCanvases  = document.querySelectorAll('.markup-canvas');
    if (!pdfCanvases.length) return;
    // Merge first page as example
    const pdf = pdfCanvases[0], mu = muCanvases[0];
    const out = document.createElement('canvas');
    out.width = pdf.width; out.height = pdf.height;
    const ctx = out.getContext('2d');
    ctx.drawImage(pdf, 0, 0);
    ctx.drawImage(mu, 0, 0);
    const a = document.createElement('a');
    a.href = out.toDataURL('image/png');
    a.download = (pdfUrl||'page').split('/').pop().replace('.pdf','') + '_annotated.png';
    a.click();
  }

    } catch {}
  })();
