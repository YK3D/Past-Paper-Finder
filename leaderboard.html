<script>
  let _myId = null, _myName = null;

  // JSONBin.io free persistent storage
  // Create a free bin at jsonbin.io, paste the bin ID and API key below
  // OR: data is stored locally per-device with best-effort sync
  const JSONBIN_ID  = '';   // e.g. '65abc123def456'
  const JSONBIN_KEY = '';   // e.g. '$2a$10$...'
  const JSONBIN_URL = JSONBIN_ID ? `https://api.jsonbin.io/v3/b/${JSONBIN_ID}` : null;

  // Restore theme
  try {
    if (localStorage.getItem('pp_theme') === 'light') document.body.classList.add('light');
  } catch {}

  document.addEventListener('DOMContentLoaded', async () => {
    try {
      _myId   = localStorage.getItem('lb_id');
      _myName = localStorage.getItem('lb_name');
    } catch {}

    if (_myName && _myId) {
      document.getElementById('nameInput').value = _myName;
      document.getElementById('registerSection').style.display = 'none';
      showYouCard();
    }
    await renderLeaderboard();
  });

  async function getStore() {
    // Try JSONBin first
    if (JSONBIN_URL && JSONBIN_KEY) {
      try {
        const r = await fetch(JSONBIN_URL + '/latest', {
          headers: { 'X-Master-Key': JSONBIN_KEY }
        });
        const j = await r.json();
        return j.record || {};
      } catch {}
    }
    // Try Vercel API fallback
    try {
      const r = await fetch('/api/leaderboard-data');
      if (r.ok) return await r.json();
    } catch {}
    // Final fallback: localStorage
    try {
      return JSON.parse(localStorage.getItem('lb_store') || '{}');
    } catch { return {}; }
  }

  async function saveStore(data) {
    // Always save locally
    try { localStorage.setItem('lb_store', JSON.stringify(data)); } catch {}
    // Try JSONBin
    if (JSONBIN_URL && JSONBIN_KEY) {
      try {
        await fetch(JSONBIN_URL, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY },
          body: JSON.stringify(data)
        });
        return;
      } catch {}
    }
    // Try Vercel API
    if (_myId && _myName) {
      try {
        await fetch('/api/leaderboard-data', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: _myId, name: _myName, increment: false })
        });
      } catch {}
    }
  }

  async function joinLeaderboard() {
    const name = document.getElementById('nameInput').value.trim();
    if (!name) return;
    if (!_myId) _myId = Date.now().toString(36) + Math.random().toString(36).slice(2);
    _myName = name;
    try { localStorage.setItem('lb_id', _myId); localStorage.setItem('lb_name', _myName); } catch {}

    const data = await getStore();
    if (!data[_myId]) data[_myId] = { name, count: 0 };
    data[_myId].name = name;
    await saveStore(data);

    document.getElementById('registerSection').style.display = 'none';
    showYouCard();
    await renderLeaderboard();
  }

  async function renderLeaderboard() {
    const list = document.getElementById('lbList');
    try {
      const data = await getStore();
      const entries = Object.entries(data)
        .map(([id, v]) => ({ id, name: v.name, count: v.count || 0 }))
        .sort((a, b) => b.count - a.count);

      if (!entries.length) {
        list.innerHTML = '<div class="lb-empty">No entries yet — be the first!</div>';
        return;
      }

      list.innerHTML = entries.map((e, i) => {
        const rank = i + 1;
        const isYou = e.id === _myId;
        const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
        return `<div class="lb-row${rank<=3?' rank-'+rank:''}${isYou?' lb-you':''}">
          <div class="lb-rank">${medal}</div>
          <div class="lb-name">${esc(e.name)}${isYou?' <span style="font-size:0.6rem;color:var(--accent);font-family:Space Mono,monospace">(you)</span>':''}</div>
          <div class="lb-count"><span>${e.count.toLocaleString()}</span> viewed</div>
        </div>`;
      }).join('');

      if (_myId) {
        const idx = entries.findIndex(e => e.id === _myId);
        const me  = entries[idx];
        if (me) {
          const r = idx + 1;
          document.getElementById('youRank').textContent  = r===1?'🥇':r===2?'🥈':r===3?'🥉':'#'+r;
          document.getElementById('youName').textContent  = me.name;
          document.getElementById('youCount').textContent = me.count.toLocaleString() + ' viewed';
        }
      }
    } catch {
      list.innerHTML = '<div class="lb-empty">Could not load leaderboard.</div>';
    }
  }

  function showYouCard() {
    document.getElementById('youCard').classList.add('show');
    document.getElementById('youName').textContent  = _myName || '';
    document.getElementById('youCount').textContent = '— viewed';
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function goBack() {
    sessionStorage.setItem('fromCodes', '1');
    window.location.href = '/';
  }
</script>
